<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Savane</title>

<link rel="stylesheet" href="../style.css">

<style>

body{
margin:0;
background:#ffe082;
font-family:Arial;
text-align:center;
}

h1{
color:#ff9800;
margin-top:20px;
}

#grille{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:20px;

padding:20px;

max-width:900px;

margin:auto;

}

.carte{

background:white;

border-radius:25px;

padding:25px;

cursor:pointer;

box-shadow:0 8px 15px rgba(0,0,0,.2);

transition:.2s;

}

.carte:hover{

transform:scale(1.05);

}

img{

width:120px;

}

h2{

font-size:24px;

margin-top:15px;

}

</style>

</head>

<body>

<h1>🦁 Monde Savane</h1>

<div id="grille">

<div class="carte" onclick="location.href='nourrir-simba.html'">

<img src="../assets/simba.png">

<h2>Nourrir Simba</h2>

</div>

<div class="carte" onclick="location.href='puzzle-simba.html'">

<img src="../assets/puzzle.png">

<h2>Puzzle</h2>

</div>

<div class="carte" onclick="location.href='memory.html'">

<img src="../assets/memory.png">

<h2>Memory</h2>

</div>

<div class="carte" onclick="location.href='couleurs.html'">

<img src="../assets/couleurs.png">

<h2>Couleurs</h2>

</div>

</div>

</body>

</html>
