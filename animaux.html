<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Les animaux - Le Monde de Malo</title>
<style>
  html,body{ margin:0; padding:0; overflow:hidden; touch-action:manipulation; overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;-moz-user-select:none;-ms-user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
  }
  *{-webkit-tap-highlight-color:transparent; box-sizing:border-box;}
  ::selection{background:transparent;}
  #wrap{
    position:relative; width:100vw; height:100vh; overflow:hidden;
    background:#e8d9a0 url('images/safari_bg.jpg') center/cover no-repeat;
    display:flex; flex-direction:column;
  }

  .topbar{position:relative; z-index:40; display:flex; justify-content:space-between; align-items:flex-start; padding:14px;}
  .round-btn{
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.75); border:3px solid rgba(255,255,255,.95);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:900; color:#3a4a5a; text-decoration:none;
    box-shadow:0 4px 10px rgba(0,0,0,.2); cursor:pointer;
  }
  .round-btn:active{ transform:scale(.94); }
  .score-pill{
    background:rgba(255,255,255,.85); border-radius:20px; padding:8px 18px;
    font-size:clamp(14px,3.6vw,18px); font-weight:800; color:#5a3a1c;
    box-shadow:0 4px 10px rgba(0,0,0,.2); white-space:nowrap;
  }

  #stage{ position:relative; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:3vh; padding:0 4vw 12vh; }

  #choices{
    display:grid; grid-template-columns:1fr 1fr; gap:5vw;
    width:100%; max-width:260px;
  }
  .choice-card{
    position:relative; border-radius:18px; overflow:hidden;
    border:3px solid rgba(255,255,255,.8); box-shadow:0 5px 12px rgba(0,0,0,.18);
    aspect-ratio:1/1; cursor:pointer; background:rgba(255,255,255,.3);
    transition:transform .15s;
  }
  .choice-card img{ width:100%; height:100%; object-fit:cover; display:block; opacity:.6; }
  .choice-card:active{ transform:scale(.95); }
  .choice-card.correct{ animation: correctPop .5s ease-out; border-color:#7be06a; }
  .choice-card.wrong{ animation: wrongShake .4s ease-in-out; }
  @keyframes correctPop{ 0%{transform:scale(1);} 40%{transform:scale(1.08);} 100%{transform:scale(1);} }
  @keyframes wrongShake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-8px); }
    75%{ transform:translateX(8px); }
  }
  .choice-card .check{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:54px; background:rgba(123,224,106,.55); opacity:0; transition:opacity .2s; pointer-events:none;
  }
  .choice-card.correct .check{ opacity:1; }

  .toast{
    position:absolute; left:50%; top:14px; transform:translateX(-50%);
    background:#fff; padding:9px 20px; border-radius:20px; font-weight:800; color:#a5672f;
    box-shadow:0 4px 10px rgba(0,0,0,.2); opacity:0; transition:opacity .3s; pointer-events:none;
    z-index:60; font-size:clamp(13px,3.6vw,16px); white-space:nowrap;
  }
  .toast.show{ opacity:1; }

  .confetti-piece{position:fixed; pointer-events:none; border-radius:2px; z-index:70;}

  #endBanner{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(255,255,255,.95); opacity:0; pointer-events:none; transition:opacity .3s; text-align:center; z-index:80;
  }
  #endBanner.show{ opacity:1; pointer-events:auto; }
  #endBanner .big{ font-size:54px; margin-bottom:8px; }
  #endBanner h2{ color:#e0507f; font-size:28px; margin:0 0 8px 0; }
  #endBanner p{ color:#5a7a67; font-weight:600; margin:0 0 22px 0; }

  #startOverlay{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(255,255,255,.9); z-index:90; text-align:center;
    animation: pulseSound 1.4s ease-in-out infinite;
  }
  #startOverlay .big{ font-size:64px; margin-bottom:10px; }
  #startOverlay h2{ color:#e0932a; font-size:24px; margin:0; }
  @keyframes pulseSound{
    0%,100%{ opacity:1; } 50%{ opacity:.85; }
  }
  .again-btn{
    background:linear-gradient(180deg,#ffe08a,#ffd166); border:none; border-bottom:5px solid #d99a1f;
    border-radius:40px; padding:14px 40px; font-family:inherit; font-weight:800; font-size:18px;
    color:#7a4a26; cursor:pointer;
  }
  .again-btn:active{ transform:translateY(3px); border-bottom-width:1px; }
</style>
</head>
<body>
<div id="wrap">
  <div class="topbar">
    <a class="round-btn" href="index.html">←</a>
    <div class="score-pill">🐾 <span id="scoreCount">0</span>/<span id="scoreTotal">16</span></div>
    <button class="round-btn" id="soundToggle">🔊</button>
  </div>

  <div id="stage">
    <div class="toast" id="toast"></div>
    <div id="choices"></div>
  </div>

  <div id="startOverlay">
    <div class="big">🐾</div>
    <h2>Touche pour commencer !</h2>
  </div>

  <div id="endBanner">
    <div class="big">🎉🐾🎉</div>
    <h2>Bravo Malo !</h2>
    <p>Tu as trouvé tous les animaux !</p>
    <button class="again-btn" id="againBtn">🔁 Rejouer</button>
  </div>
</div>

<script>
/* ================= Les 16 animaux (photos déjà intégrées, sons à déposer dans sounds/animals/) ================= */
const ANIMALS = [
  { id:'dog',       label:'Chien',    img:'images/animals/anim_dog.png',       sound:'sounds/animals/dog.mp3' },
  { id:'cat',       label:'Chat',     img:'images/animals/anim_cat.png',       sound:'sounds/animals/cat.mp3' },
  { id:'lion',      label:'Lion',     img:'images/animals/anim_lion.png',      sound:'sounds/animals/lion.mp3' },
  { id:'elephant',  label:'Éléphant', img:'images/animals/anim_elephant.png',  sound:'sounds/animals/elephant.mp3' },
  { id:'cow',       label:'Vache',    img:'images/animals/anim_cow.png',       sound:'sounds/animals/cow.mp3' },
  { id:'horse',     label:'Cheval',   img:'images/animals/anim_horse.png',     sound:'sounds/animals/horse.mp3' },
  { id:'giraffe',   label:'Girafe',   img:'images/animals/anim_giraffe.png',   sound:'sounds/animals/giraffe.mp3' },
  { id:'zebra',     label:'Zèbre',    img:'images/animals/anim_zebra.png',     sound:'sounds/animals/zebra.mp3' },
  { id:'pig',       label:'Cochon',   img:'images/animals/anim_pig.png',       sound:'sounds/animals/pig.mp3' },
  { id:'chicken',   label:'Poule',    img:'images/animals/anim_chicken.png',   sound:'sounds/animals/chicken.mp3' },
  { id:'monkey',    label:'Singe',    img:'images/animals/anim_monkey.png',    sound:'sounds/animals/monkey.mp3' },
  { id:'hippo',     label:'Hippopotame', img:'images/animals/anim_hippo.png', sound:'sounds/animals/hippo.mp3' },
  { id:'sheep',     label:'Mouton',   img:'images/animals/anim_sheep.png',     sound:'sounds/animals/sheep.mp3' },
  { id:'duck',      label:'Canard',   img:'images/animals/anim_duck.png',      sound:'sounds/animals/duck.mp3' },
  { id:'crocodile', label:'Crocodile',img:'images/animals/anim_crocodile.png', sound:'sounds/animals/crocodile.mp3' },
  { id:'cheetah',   label:'Guépard',  img:'images/animals/anim_cheetah.png',   sound:'sounds/animals/cheetah.mp3' },
];

/* ================= Son ================= */
let muted = false;
const SFX = {
  win:  new Audio('sounds/win.wav'),
  miss: new Audio('sounds/miss.wav'),
  chime:new Audio('sounds/chime.wav'),
};
function playSfx(name){
  if(muted) return;
  const src = SFX[name];
  if(!src) return;
  try{ const a = src.cloneNode(); a.volume = 0.6; a.play().catch(()=>{}); }catch(e){}
}
const animalAudioCache = {};
let currentPlayingAudio = null;
function stopAnimalSound(){
  if(currentPlayingAudio){
    currentPlayingAudio.pause();
    currentPlayingAudio.currentTime = 0;
  }
}
function playAnimalSound(a){
  if(muted) return;
  stopAnimalSound();
  let audio = animalAudioCache[a.id];
  if(!audio){ audio = new Audio(a.sound); animalAudioCache[a.id] = audio; }
  try{
    audio.currentTime = 0;
    audio.play().catch(()=>{});
    currentPlayingAudio = audio;
  }catch(e){}
}

const bgMusic = new Audio('sounds/musique_fond.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.02;
let bgStarted = false;
function startBgMusic(){
  if(bgStarted) return;
  bgStarted = true;
  if(!muted) bgMusic.play().catch(()=>{});
}

document.getElementById('soundToggle').addEventListener('click', ()=>{
  muted = !muted;
  document.getElementById('soundToggle').textContent = muted ? '🔇' : '🔊';
  if(muted){ bgMusic.pause(); } else if(bgStarted){ bgMusic.play().catch(()=>{}); }
});

/* ================= Toast ================= */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=> t.classList.remove('show'), 1400);
}

/* ================= Confettis ================= */
function burstConfetti(x, y){
  const colors = ['#ff6f9c','#ffd166','#8fd694','#6fc3ff','#c98fff'];
  for(let i=0;i<16;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const size = 6 + Math.random()*6;
    p.style.width = size+'px'; p.style.height = size+'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.left = x+'px'; p.style.top = y+'px';
    document.body.appendChild(p);
    const dx = (Math.random()-0.5)*260;
    const dy = -(100+Math.random()*180);
    p.style.transition = 'transform .9s cubic-bezier(.2,.8,.3,1), opacity .9s';
    requestAnimationFrame(()=>{
      p.style.transform = `translate(${dx}px, ${dy}px) rotate(${Math.random()*360}deg)`;
      p.style.opacity = '0';
    });
    setTimeout(()=> p.remove(), 950);
  }
}

/* ================= Logique du jeu ================= */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

let pool = [];       // animaux restant à trouver dans ce tour complet
let found = 0;
let current = null;
let locked = false;  // évite de spammer pendant l'animation de transition

function newRound(){
  locked = false;
  if(pool.length === 0){
    setTimeout(()=>{
      document.getElementById('endBanner').classList.add('show');
      playSfx('win');
    }, 300);
    return;
  }
  current = pool.pop();

  const others = shuffle(ANIMALS.filter(a => a.id !== current.id)).slice(0,3);
  const choices = shuffle([current, ...others]);

  const el = document.getElementById('choices');
  el.innerHTML = '';
  choices.forEach(a=>{
    const card = document.createElement('div');
    card.className = 'choice-card';
    card.innerHTML = `<img src="${a.img}" alt="${a.label}"><div class="check">✅</div>`;
    card.addEventListener('pointerup', ()=> handleChoice(a, card));
    el.appendChild(card);
  });

  playAnimalSound(current);
}

function handleChoice(a, card){
  if(locked) return;
  if(a.id === current.id){
    locked = true;
    stopAnimalSound();
    card.classList.add('correct');
    found++;
    document.getElementById('scoreCount').textContent = found;
    playSfx('win');
    toast('🎉 Bravo, c\'est le/la ' + current.label + ' !');
    const rect = card.getBoundingClientRect();
    burstConfetti(rect.left + rect.width/2, rect.top + rect.height/2);
    setTimeout(newRound, 1300);
  } else {
    card.classList.add('wrong');
    playSfx('miss');
    toast('Essaie encore ! 🤔');
    setTimeout(()=> card.classList.remove('wrong'), 400);
  }
}

document.getElementById('startOverlay').addEventListener('pointerdown', ()=>{
  startBgMusic();
  document.getElementById('startOverlay').style.display = 'none';
  startGame();
}, {once:true});

document.getElementById('againBtn').addEventListener('click', ()=>{
  document.getElementById('endBanner').classList.remove('show');
  startGame();
});

function startGame(){
  pool = shuffle(ANIMALS);
  found = 0;
  document.getElementById('scoreCount').textContent = 0;
  document.getElementById('scoreTotal').textContent = ANIMALS.length;
  newRound();
}

</script>
</body>
</html>
