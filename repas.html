<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Le repas - Le Monde de Malo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap');
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -moz-user-select:none; -ms-user-select:none; -webkit-touch-callout:none;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:'Baloo 2',sans-serif;background:#2b1c10; touch-action:manipulation; overscroll-behavior:none;}
  ::selection{background:transparent;}

  #wrap{position:relative; width:100%; height:100%; overflow:hidden; display:flex; flex-direction:column; background:#3c2513;}
  #stage{position:relative; width:100%; flex:1; overflow:hidden; display:flex; align-items:center; justify-content:center;}
  #trayFiller{flex:0 0 auto; height:0; background:#fff8ea;}
  .photo-frame{position:relative; height:100%; aspect-ratio:1402/1122; max-width:100%; max-height:100%;}
  @media (max-aspect-ratio:1402/1122){
    .photo-frame{ height:auto; width:100%; }
  }
  #stage img.photo{position:absolute; inset:0; width:100%; height:100%; display:block;}

  .topbar{position:absolute; top:0; left:0; width:100%; display:flex; justify-content:space-between; padding:14px; z-index:100; pointer-events:none;}
  .topbar > *{pointer-events:auto;}
  .pill{background:rgba(255,255,255,.92); border:none; border-radius:30px; padding:10px 18px; font-family:inherit; font-weight:800; color:#7a4a26; box-shadow:0 4px 10px rgba(0,0,0,.25); font-size:14px; cursor:pointer; display:flex; align-items:center; gap:6px;}
  .pill:active{transform:scale(.96);}
  .back-pill{font-size:18px; font-weight:800;}
  .score-pill{background:rgba(255,255,255,.92); border-radius:30px; padding:10px 16px; font-weight:800; color:#7a4a26; box-shadow:0 4px 10px rgba(0,0,0,.25); font-size:14px; display:flex; align-items:center; gap:6px;}

  .plate-zone{
    position:absolute; z-index:10;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    flex-wrap:wrap; align-content:center; gap:2px; padding:2%;
  }
  .plate-zone.hover{ background:rgba(255,255,255,.18); box-shadow:0 0 0 6px rgba(255,255,255,.35) inset; }
  .glass-zone{
    position:absolute; z-index:10;
    border-radius:40%;
    display:flex; align-items:center; justify-content:center;
  }
  .glass-zone.hover{ background:rgba(255,255,255,.22); box-shadow:0 0 0 5px rgba(255,255,255,.4) inset; }
  .plate-food{ display:flex; align-items:center; justify-content:center; line-height:1; font-size:clamp(38px,11.5vw,60px); filter:drop-shadow(0 3px 3px rgba(0,0,0,.35)); animation:foodPop .3s cubic-bezier(.3,1.5,.4,1) backwards; }
  .plate-food.drink-placed{ font-size:clamp(26px,8vw,40px); }
  @keyframes foodPop{ from{transform:scale(0);} to{transform:scale(1);} }

  .char-zone{ position:absolute; z-index:8; cursor:pointer; border-radius:26px; }
  .char-zone.ready{ animation: charPulse 1.1s ease-in-out infinite; }
  @keyframes charPulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,224,138,0) inset; }
    50%{ box-shadow:0 0 0 12px rgba(255,224,138,.45) inset; }
  }
  .tap-hint{position:absolute; top:-6px; left:50%; transform:translateX(-50%); font-size:clamp(22px,6vw,30px);
    animation:tapBounce 1s ease-in-out infinite; pointer-events:none; filter:drop-shadow(0 2px 3px rgba(0,0,0,.4)); display:none;}
  .char-zone.ready .tap-hint{ display:block; }
  @keyframes tapBounce{0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-10px);}}

  .miam-bubble{position:absolute; background:#fff; color:#e0507f; font-weight:900; padding:5px 14px; border-radius:18px; font-size:clamp(13px,3.6vw,17px); box-shadow:0 4px 10px rgba(0,0,0,.3); z-index:56; pointer-events:none; opacity:0; transform:translate(-50%,0) scale(.4); transition:transform .35s cubic-bezier(.3,1.6,.4,1), opacity .35s; white-space:nowrap;}
  .miam-bubble.show{opacity:1; transform:translate(-50%,-14px) scale(1);}

  .happy-float{position:absolute; font-size:30px; z-index:55; pointer-events:none; opacity:1; transition:transform .9s ease-out, opacity .9s;}
  .happy-pulse{animation:happyGlow .6s ease-out;}
  @keyframes happyGlow{0%{filter:brightness(1);} 40%{filter:brightness(1.18) saturate(1.2);} 100%{filter:brightness(1);}}

  .toast{position:absolute; left:50%; top:14px; transform:translateX(-50%); background:#fff; padding:8px 18px; border-radius:20px; font-weight:700; color:#a5672f; box-shadow:0 4px 10px rgba(0,0,0,.2); opacity:0; transition:opacity .3s; z-index:200; font-size:13px; pointer-events:none; white-space:nowrap;}
  .toast.show{opacity:1;}

  /* ---- pioche du bas : grille visible en entier, plus de scroll horizontal ---- */
  #tray{
    position:relative; width:100%; flex:0 0 auto;
    background:#fff8ea; border-top:3px solid #f1dcb0;
    display:flex; flex-wrap:wrap; align-items:flex-start; justify-content:center; gap:8px;
    padding:10px 10px calc(10px + env(safe-area-inset-bottom));
    z-index:40; box-shadow:0 -4px 10px rgba(0,0,0,.06);
  }
  .tray-sep{flex:0 0 100%; height:2px; background:#f1dcb0; border-radius:2px; margin:2px 6px;}
  .food-item{
    flex:0 0 auto; width:17.5%; max-width:94px; min-width:56px; aspect-ratio:1/1.08; border-radius:16px;
    background:linear-gradient(180deg,#fff,#fff3dd); border:3px solid #fff;
    box-shadow:0 4px 8px rgba(0,0,0,.22);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
    cursor:grab; touch-action:none;
  }
  .food-item .fi-emoji{font-size:clamp(26px,7.6vw,40px); touch-action:none; pointer-events:none; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;}
  .food-item .fi-label{font-size:clamp(8px,2.1vw,10.5px); font-weight:800; color:#a5672f; text-align:center; line-height:1.05; touch-action:none; pointer-events:none; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;}
  .food-item:active{transform:scale(.93);}
  .food-item.drink{background:linear-gradient(180deg,#fff,#e2f6ff);}
  .pill, .pill *{ touch-action:manipulation; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;}

  .ghost-item{
    position:fixed; z-index:500; pointer-events:none;
    width:84px; height:84px; border-radius:18px;
    background:rgba(255,255,255,.95); border:3px solid #fff;
    box-shadow:0 8px 16px rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center;
    font-size:46px; opacity:.95;
  }

  .end-banner{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(255,255,255,.94); opacity:0; pointer-events:none; transition:opacity .3s; text-align:center; padding:0 8vw; z-index:60;}
  .end-banner.show{opacity:1; pointer-events:auto;}
  .end-banner .big{font-size:50px; margin-bottom:6px;}
  .end-banner h2{color:#e0507f; font-size:28px; margin:0 0 6px 0;}
  .end-banner p{color:#5a7a67; font-weight:500; margin:0 0 20px 0;}
  .again-btn{background:linear-gradient(180deg,#ffe08a,#ffd166); border:none; border-bottom:5px solid #d99a1f; border-radius:40px; padding:14px 40px; font-family:inherit; font-weight:800; font-size:18px; color:#7a4a26; cursor:pointer;}
  .again-btn:active{transform:translateY(3px); border-bottom-width:1px;}
  .confetti-piece{position:absolute; pointer-events:none; border-radius:2px; z-index:70;}
</style>
</head>
<body>
<div id="wrap">
  <div class="topbar">
    <button class="pill back-pill" onclick="window.location.href='index.html'">←</button>
    <div class="score-pill">🍽️ <span id="mealCount">0</span> repas</div>
    <button class="pill" id="soundToggle" onclick="toggleMute()">🔊</button>
  </div>

  <div id="stage">
    <div class="photo-frame" id="photoFrame">
      <img class="photo" id="repasPhoto" src="images/repas_bg.jpg" alt="le repas de Malo" onerror="this.style.display='none'; document.getElementById('photoFrame').style.background='linear-gradient(180deg,#7a4a26,#3c2513)';">
      <div class="toast" id="toast"></div>
      <div class="plate-zone" id="zone-lion"  data-char="lion"></div>
      <div class="plate-zone" id="zone-malo"  data-char="malo"></div>
      <div class="plate-zone" id="zone-chien" data-char="chien"></div>
      <div class="glass-zone" id="glass-lion"  data-char="lion"></div>
      <div class="glass-zone" id="glass-malo"  data-char="malo"></div>
      <div class="glass-zone" id="glass-chien" data-char="chien"></div>
      <div class="char-zone" id="char-lion"  data-char="lion"><span class="tap-hint">👉🍽️</span></div>
      <div class="char-zone" id="char-malo"  data-char="malo"><span class="tap-hint">👉🍽️</span></div>
      <div class="char-zone" id="char-chien" data-char="chien"><span class="tap-hint">👉🍽️</span></div>
    </div>
    <div class="end-banner" id="endBanner">
      <div class="big">🦁🍽️🐶</div>
      <h2>Bravo !</h2>
      <p>Tout le monde a bien mangé !</p>
      <button class="again-btn" onclick="resetMeal()">Rejouer</button>
    </div>
  </div>

  <div id="tray"></div>
  <div id="trayFiller"></div>
</div>

<script>
document.addEventListener('selectstart', e=>e.preventDefault());
document.addEventListener('contextmenu', e=>e.preventDefault());

/* ================= Positions des 3 assiettes sur la photo (en %) ================= */
function box(node,l,t,w,h){
  node.style.left=l+'%'; node.style.top=t+'%'; node.style.width=w+'%'; node.style.height=h+'%';
}
box(document.getElementById('zone-lion'),  1,  66, 33, 19);
box(document.getElementById('zone-malo'),  34, 65, 32, 18);
box(document.getElementById('zone-chien'), 65, 69, 33, 17);
box(document.getElementById('glass-lion'),  0,  87, 16, 13);
box(document.getElementById('glass-malo'),  34, 87, 16, 13);
box(document.getElementById('glass-chien'), 80, 85, 16, 14);
box(document.getElementById('char-lion'),  0,  8, 35, 62);
box(document.getElementById('char-malo'),  32, 0, 36, 68);
box(document.getElementById('char-chien'), 65, 8, 35, 62);

/* ================= Son (Web Audio, aucun fichier) ================= */
let actx, muted=false;
function ac(){ actx = actx || new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function tone(freq,dur,type,vol,delay){
  if(muted) return;
  setTimeout(()=>{
    try{
      const a=ac(); const o=a.createOscillator(); const g=a.createGain();
      o.type=type||'sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0.0001,a.currentTime);
      g.gain.exponentialRampToValueAtTime(vol||.2,a.currentTime+.02);
      g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
      o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur+.02);
    }catch(e){}
  }, delay||0);
}
function happyChord(){ [520,660,780].forEach((f,i)=>setTimeout(()=>tone(f,.25,'triangle',.2), i*90)); }
function soundRoar(){
  if(muted) return;
  try{
    const a=ac(); const o=a.createOscillator(); const g=a.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(110,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(70,a.currentTime+.35);
    o.frequency.exponentialRampToValueAtTime(150,a.currentTime+.55);
    g.gain.setValueAtTime(.0001,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.25,a.currentTime+.12);
    g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.8);
    o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+.85);
  }catch(e){}
}
function soundBark(){
  if(muted) return;
  [0,160].forEach(delay=>{
    setTimeout(()=>{
      try{
        const a=ac(); const o=a.createOscillator(); const g=a.createGain();
        o.type='square';
        o.frequency.setValueAtTime(320,a.currentTime);
        o.frequency.exponentialRampToValueAtTime(180,a.currentTime+.13);
        g.gain.setValueAtTime(.0001,a.currentTime);
        g.gain.exponentialRampToValueAtTime(.22,a.currentTime+.02);
        g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.16);
        o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+.18);
      }catch(e){}
    }, delay);
  });
}
function soundGiggle(){
  [0,110,220].forEach((delay,i)=>{
    setTimeout(()=>tone(700+i*90,.12,'triangle',.16), delay);
  });
}
function toggleMute(){ muted=!muted; document.getElementById('soundToggle').textContent = muted?'🔇':'🔊'; }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),1400);
}

/* ================= La pioche : 10 aliments (entrée -> dessert) + 4 boissons ================= */
const FOODS = [
  {emoji:'🥗', label:'Salade'},
  {emoji:'🍲', label:'Soupe'},
  {emoji:'🍝', label:'Pâtes'},
  {emoji:'🍗', label:'Poulet'},
  {emoji:'🐟', label:'Poisson'},
  {emoji:'🍚', label:'Riz'},
  {emoji:'🥕', label:'Légumes'},
  {emoji:'🍕', label:'Pizza'},
  {emoji:'🍎', label:'Pomme'},
  {emoji:'🍰', label:'Gâteau'},
];
const DRINKS = [
  {emoji:'💧', label:'Eau'},
  {emoji:'🧃', label:'Jus'},
  {emoji:'🥛', label:'Lait'},
  {emoji:'🍊', label:"Jus d'orange"},
];

const tray = document.getElementById('tray');
FOODS.forEach(f=> tray.appendChild(makeFoodItem(f,false)) );
const sep = document.createElement('div'); sep.className='tray-sep'; tray.appendChild(sep);
DRINKS.forEach(d=> tray.appendChild(makeFoodItem(d,true)) );

function makeFoodItem(data, isDrink){
  const div = document.createElement('div');
  div.className = 'food-item' + (isDrink ? ' drink' : '');
  div.innerHTML = '<span class="fi-emoji">'+data.emoji+'</span><span class="fi-label">'+data.label+'</span>';
  attachFoodDrag(div, data.emoji, isDrink ? 'drink' : 'food');
  return div;
}

/* ================= Glisser-déposer réel (comme la construction) ================= */
let dragState = null;

function attachFoodDrag(el, emoji, cat){
  el.addEventListener('pointerdown', (ev)=>{
    ev.preventDefault();
    const ghost = document.createElement('div');
    ghost.className = 'ghost-item';
    ghost.textContent = emoji;
    ghost.style.left = (ev.clientX-42)+'px';
    ghost.style.top = (ev.clientY-42)+'px';
    document.body.appendChild(ghost);
    dragState = { emoji, cat, ghost, pointerId: ev.pointerId, moved:false };
  }, {passive:false});
}

window.addEventListener('pointermove', (ev)=>{
  if(!dragState || ev.pointerId !== dragState.pointerId) return;
  dragState.moved = true;
  dragState.ghost.style.left = (ev.clientX-42)+'px';
  dragState.ghost.style.top = (ev.clientY-42)+'px';
  const selector = dragState.cat==='drink' ? '.glass-zone' : '.plate-zone';
  document.querySelectorAll(selector).forEach(z=>{
    const r = z.getBoundingClientRect();
    const over = ev.clientX>=r.left && ev.clientX<=r.right && ev.clientY>=r.top && ev.clientY<=r.bottom;
    z.classList.toggle('hover', over);
  });
}, {passive:true});

function endFoodDrag(ev){
  if(!dragState || ev.pointerId !== dragState.pointerId) return;
  let landed = null;
  const selector = dragState.cat==='drink' ? '.glass-zone' : '.plate-zone';
  document.querySelectorAll(selector).forEach(z=>{
    z.classList.remove('hover');
    const r = z.getBoundingClientRect();
    const over = ev.clientX>=r.left && ev.clientX<=r.right && ev.clientY>=r.top && ev.clientY<=r.bottom;
    if(over) landed = z;
  });
  if(dragState.moved && landed){
    feedCharacter(landed, dragState.emoji, dragState.cat);
    dragState.ghost.remove();
  } else {
    dragState.ghost.style.transition = 'transform .25s ease-in, opacity .25s ease-in';
    dragState.ghost.style.transform = 'scale(.3)';
    dragState.ghost.style.opacity = '0';
    setTimeout(()=>dragState.ghost.remove(), 250);
  }
  dragState = null;
}
window.addEventListener('pointerup', endFoodDrag, {passive:true});
window.addEventListener('pointercancel', ()=>{
  if(dragState){ dragState.ghost.remove(); dragState=null; }
}, {passive:true});

/* ================= Nourrir un personnage ================= */
let mealCount = 0;
const photoFrame = document.getElementById('photoFrame');
const CHAR_MSG = {
  lion:  { sound: soundRoar,   msgs: ['Miam, le lion adore ça ! 🦁', 'Le lion rugit de bonheur !'] },
  malo:  { sound: soundGiggle, msgs: ['Malo se régale ! 😋', 'Miam miam dit Malo !'] },
  chien: { sound: soundBark,   msgs: ['Le chiot remue la queue ! 🐶', 'Wouf wouf, encore !'] },
};

function feedCharacter(zone, emoji, cat){
  const foodEl = document.createElement('div');
  foodEl.className = 'plate-food' + (cat==='drink' ? ' drink-placed' : '');
  foodEl.textContent = emoji;

  if(cat==='drink'){
    zone.innerHTML = ''; // un verre ne contient qu'une boisson à la fois
  }
  zone.appendChild(foodEl);
  if(cat!=='drink'){
    // on garde au maximum 3 aliments visibles par assiette (pour rester gros et lisible)
    while(zone.children.length > 3) zone.removeChild(zone.firstChild);
  }

  tone(520,.09,'triangle',.12); // petit "plop" quand on pose l'aliment
  const charKey = zone.dataset.char;
  const charZone = document.getElementById('char-'+charKey);
  if(charZone) charZone.classList.add('ready');
}

function eatCharacter(charKey){
  const plateZone = document.getElementById('zone-'+charKey);
  const glassZone = document.getElementById('glass-'+charKey);
  const items = [...plateZone.children, ...glassZone.children];

  if(items.length === 0){
    toast("Donne-lui à manger ou à boire d'abord ! 🍽️");
    tone(300,.1,'sine',.1);
    return;
  }

  mealCount += items.length;
  document.getElementById('mealCount').textContent = mealCount;

  const info = CHAR_MSG[charKey];
  info.sound();
  toast(info.msgs[Math.floor(Math.random()*info.msgs.length)]);

  photoFrame.classList.remove('happy-pulse'); void photoFrame.offsetWidth; photoFrame.classList.add('happy-pulse');
  spawnHappyIcon(plateZone.children.length ? plateZone : glassZone);
  spawnMiamBubble(plateZone.children.length ? plateZone : glassZone);

  items.forEach((foodEl,i)=>{
    setTimeout(()=>{
      if(!foodEl.parentNode) return;
      foodEl.style.transition = 'transform .4s cubic-bezier(.4,0,.6,1), opacity .4s';
      foodEl.style.transform = 'scale(.15) translateY(-6px)';
      foodEl.style.opacity = '0';
      setTimeout(()=>foodEl.remove(), 400);
    }, i*120);
  });

  const charZone = document.getElementById('char-'+charKey);
  if(charZone) charZone.classList.remove('ready');

  if(mealCount>0 && Math.floor(mealCount/5) > Math.floor((mealCount-items.length)/5)){
    burstConfetti(plateZone);
  }
  if(mealCount >= 12){
    setTimeout(()=>{
      happyChord();
      document.getElementById('endBanner').classList.add('show');
    }, 500);
  }
}

document.querySelectorAll('.char-zone').forEach(cz=>{
  cz.addEventListener('pointerup', (ev)=>{
    ev.preventDefault();
    eatCharacter(cz.dataset.char);
  });
});

function spawnMiamBubble(zone){
  const words = ['Miam !','Miam miam !','Trop bon !','Croc croc !'];
  const r = zone.getBoundingClientRect();
  const fr = photoFrame.getBoundingClientRect();
  const b = document.createElement('div');
  b.className = 'miam-bubble';
  b.textContent = words[Math.floor(Math.random()*words.length)];
  b.style.left = (r.left - fr.left + r.width/2) + 'px';
  b.style.top = (r.top - fr.top - 12) + 'px';
  photoFrame.appendChild(b);
  requestAnimationFrame(()=> b.classList.add('show'));
  setTimeout(()=>{
    b.classList.remove('show');
    setTimeout(()=>b.remove(), 350);
  }, 900);
}

function spawnHappyIcon(zone){
  const icons = ['💛','⭐','😋','✨'];
  const r = zone.getBoundingClientRect();
  const fr = photoFrame.getBoundingClientRect();
  const h = document.createElement('div');
  h.className = 'happy-float';
  h.textContent = icons[Math.floor(Math.random()*icons.length)];
  h.style.left = (r.left - fr.left + r.width/2 - 15) + 'px';
  h.style.top = (r.top - fr.top) + 'px';
  photoFrame.appendChild(h);
  requestAnimationFrame(()=>{
    h.style.transform = 'translateY(-70px) scale(1.3)';
    h.style.opacity = '0';
  });
  setTimeout(()=>h.remove(), 950);
}

function burstConfetti(zone){
  const r = zone.getBoundingClientRect();
  const colors = ['#ff6f9c','#ffd166','#8fd694','#6fc3ff','#c98fff'];
  for(let i=0;i<14;i++){
    const p = document.createElement('div');
    p.className='confetti-piece';
    const size = 6+Math.random()*6;
    p.style.width=size+'px'; p.style.height=size+'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.left = (r.left + r.width/2)+'px'; p.style.top = (r.top)+'px'; p.style.position='fixed';
    const dx = (Math.random()-0.5)*220;
    const dy = -(80+Math.random()*160);
    p.style.transition='transform .85s cubic-bezier(.2,.8,.3,1), opacity .85s';
    document.body.appendChild(p);
    requestAnimationFrame(()=>{ p.style.transform = `translate(${dx}px, ${dy}px) rotate(${Math.random()*360}deg)`; p.style.opacity='0'; });
    setTimeout(()=>p.remove(), 900);
  }
}

function resetMeal(){
  mealCount = 0;
  document.getElementById('mealCount').textContent = 0;
  document.querySelectorAll('.plate-zone, .glass-zone').forEach(z=> z.innerHTML = '');
  document.querySelectorAll('.char-zone').forEach(cz=> cz.classList.remove('ready'));
  document.getElementById('endBanner').classList.remove('show');
  toast('On recommence ! ✨');
}
</script>
</body>
