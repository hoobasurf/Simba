<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Lego - Le Monde de Malo</title>
<style>
  html,body{ margin:0; padding:0; overflow:hidden; background:#bfe6ff; touch-action:manipulation; overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;-moz-user-select:none;-ms-user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; height:100%; }
  *{-webkit-tap-highlight-color:transparent; box-sizing:border-box;}
  ::selection{background:transparent;}
  #gameWrap{
    position:absolute; inset:0;
    overflow:hidden; background:linear-gradient(180deg,#bfe6ff,#eaf7ff 60%,#dff0d8);
  }
  canvas{ display:block; touch-action:none; }
  #backHome{
    position:absolute; top:14px; left:14px; z-index:40;
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.65); border:3px solid rgba(255,255,255,.9);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:900; color:#3a4a5a; text-decoration:none;
    box-shadow:0 4px 10px rgba(0,0,0,.25);
  }
  #backHome:active{ background:rgba(255,255,255,.9); transform:scale(.94); }

  #hint{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85); border-radius:20px; padding:8px 18px;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
    font-size:clamp(12px,3.2vw,15px); font-weight:800; color:#3a4a5a;
    box-shadow:0 4px 10px rgba(0,0,0,.2); z-index:30; text-align:center; white-space:nowrap;
  }

  #resetBtn{
    position:absolute; top:14px; right:14px; z-index:40;
    background:linear-gradient(180deg,#ff9d6a,#e6612c);
    color:#fff; border:3px solid #fff; border-radius:24px;
    padding:10px 16px; font-size:clamp(12px,3vw,15px); font-weight:900;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
    box-shadow:0 5px 12px rgba(0,0,0,.3);
  }
  #resetBtn:active{ transform:scale(.95); }

  #tray{
    position:absolute; left:0; bottom:0; width:100%; z-index:50;
    display:flex; flex-wrap:wrap; align-content:flex-start; align-items:flex-start; justify-content:center; gap:8px;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg, rgba(20,40,70,.35), rgba(20,40,70,0) 90%);
    border-top:3px dashed rgba(255,255,255,.6);
  }
  .trayLabel{ flex:1 0 100%; color:#fff; font-weight:900; font-size:13px; text-align:center; text-shadow:0 2px 3px rgba(0,0,0,.35); }
  .pieceBtn{
    flex:0 0 auto; border-radius:14px;
    background:rgba(255,255,255,.9); border:3px solid #fff;
    box-shadow:0 4px 8px rgba(0,0,0,.3);
    display:flex; align-items:center; justify-content:center;
  }
  .pieceBtn.selected{ border-color:#3fea5a; box-shadow:0 0 0 4px rgba(63,234,90,.6), 0 4px 8px rgba(0,0,0,.3); }
  .pieceBtn:active{ transform:scale(.94); }
</style>
</head>
<body>
<div id="gameWrap">
  <a id="backHome" href="index.html">←</a>
  <div id="hint">👆 Touche une pièce puis touche la plaque pour la poser</div>
  <button id="resetBtn">🗑️ Effacer</button>
  <canvas id="game"></canvas>
  <div id="tray">
    <div class="trayLabel">🧺 Pioche</div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let CW=0, CH=0;

  function fitCanvas(){
    const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
    CW = window.innerWidth; CH = window.innerHeight;
    canvas.style.width = CW+'px'; canvas.style.height = CH+'px';
    canvas.width = CW*dpr; canvas.height = CH*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  fitCanvas();
  window.addEventListener('resize', ()=>{ fitCanvas(); computeLayout(); });
  window.addEventListener('orientationchange', ()=>{ fitCanvas(); computeLayout(); });

  // ---- Fond du jeu : image fixe, pas de défilement ----
  const bgImg = new Image();
  bgImg.src = 'images/lego_bg.jpg';
  let bgReady = false;
  bgImg.onload = ()=>{ bgReady = true; };

  // ---- Pièces Lego : vraies images découpées dans les photos fournies ----
  const PIECE_DEFS = [
    {file:'piece_lego_brique_rouge.png', studs:2},
    {file:'piece_lego_brique_bleue.png', studs:2},
    {file:'piece_lego_brique_jaune.png', studs:2},
    {file:'piece_lego_brique_verte.png', studs:2},
    {file:'piece_lego_brique_blanche.png', studs:2},
    {file:'piece_lego_toit_bleu.png', studs:2},
    {file:'piece_lego_toit_rouge.png', studs:2},
    {file:'piece_lego_fenetre3.png', studs:2},
    {file:'piece_lego_porte3.png', studs:2},
    {file:'piece_lego_cloture3.png', studs:3},
    {file:'piece_lego_rocher3.png', studs:2},
    {file:'piece_lego_fleur3.png', studs:1},
    {file:'piece_lego_dinosaure3.png', studs:3},
  ];

  // ---- Disposition : plateau fixe (ne bouge jamais), pioche en grille complète (pas de scroll) ----
  let UNIT, BOARD_COLS, BOARD_X, BOARD_Y, BOARD_W_PX;
  let TRAY_THUMB = 0;
  const BRICK_TYPES = PIECE_DEFS.map(def=>{
    const img = new Image();
    img.src = 'images/' + def.file;
    return { img, studs: def.studs, w: 0, h: 0, ready:false, naturalRatio: 1 };
  });
  BRICK_TYPES.forEach(t=>{
    t.img.onload = ()=>{
      t.ready = true;
      t.naturalRatio = t.img.naturalHeight / t.img.naturalWidth;
      computeBrickPixelSize(t);
    };
  });
  function computeBrickPixelSize(t){
    t.w = t.studs * UNIT;
    t.h = t.w * t.naturalRatio;
  }

  function computeLayout(){
    const trayPad = 10, trayGap = 8, labelH = 26;

    const availW = Math.max(260, window.innerWidth - 20);
    const itemsPerRow = Math.max(3, Math.min(BRICK_TYPES.length, 5));
    const thumbTargetMax = Math.max(56, Math.min(90, window.innerHeight * 0.11));
    TRAY_THUMB = Math.floor(Math.min(thumbTargetMax, (availW - 2*trayPad - (itemsPerRow-1)*trayGap) / itemsPerRow));
    const trayRows = Math.ceil(BRICK_TYPES.length / itemsPerRow);
    const trayH = labelH + trayRows*(TRAY_THUMB+trayGap) + 2*trayPad + 6;

    UNIT = Math.max(28, Math.min(50, Math.floor(availW / 9)));
    BOARD_COLS = Math.max(6, Math.floor((window.innerWidth - 20) / UNIT));
    BOARD_W_PX = BOARD_COLS * UNIT;
    BOARD_X = Math.round((window.innerWidth - BOARD_W_PX) / 2);
    BOARD_Y = window.innerHeight - trayH - 10;

    BRICK_TYPES.forEach(computeBrickPixelSize);
    trayBtns.forEach((btn,i)=>{ btn._sizeThumb(); btn._paintThumb(); });

    document.getElementById('tray').style.height = trayH + 'px';
  }

  function drawBrick(g, type, x, topY, scale){
    if(!type.ready) return;
    scale = scale || 1;
    g.drawImage(type.img, x, topY, type.w*scale, type.h*scale);
  }

  // ---- Palette (pioche) ----
  const tray = document.getElementById('tray');
  let selectedIdx = 0;
  const trayBtns = [];
  BRICK_TYPES.forEach((t, idx)=>{
    const btn = document.createElement('div');
    btn.className = 'pieceBtn' + (idx===0 ? ' selected' : '');
    const c = document.createElement('canvas');
    function sizeThumb(){
      const dpr = Math.max(1, Math.min(window.devicePixelRatio||1, 3));
      const s = TRAY_THUMB || 70;
      btn.style.width = s+'px'; btn.style.height = s+'px';
      c.width = s*dpr; c.height = s*dpr; c.style.width=s+'px'; c.style.height=s+'px';
    }
    const g = c.getContext('2d');
    function paintThumb(){
      const dpr = Math.max(1, Math.min(window.devicePixelRatio||1, 3));
      const s = TRAY_THUMB || 70;
      g.setTransform(dpr,0,0,dpr,0,0);
      g.clearRect(0,0,s,s);
      if(t.ready){
        const sc = Math.min((s-10)/t.w, (s-10)/t.h);
        drawBrick(g, t, s/2 - (t.w*sc)/2, s/2 - (t.h*sc)/2, sc);
      }
    }
    sizeThumb();
    t.img.addEventListener('load', paintThumb);
    paintThumb();
    btn.appendChild(c);
    btn.addEventListener('pointerdown', (ev)=>{
      ev.preventDefault();
      selectedIdx = idx;
      trayBtns.forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    }, {passive:false});
    tray.appendChild(btn);
    btn._paintThumb = paintThumb;
    btn._sizeThumb = sizeThumb;
    trayBtns.push(btn);
  });

  computeLayout();

  // ---- Colonnes de la plaque : chaque colonne empile ses briques indépendamment ----
  let columns = [];
  function resetColumns(){ columns = Array.from({length: BOARD_COLS}, ()=> ({ h: 0, bricks: [] })); }
  resetColumns();
  let allBricks = [];

  function colRangeFor(colStart, studs){
    return Math.max(0, Math.min(BOARD_COLS - studs, colStart));
  }

  function placeBrickAt(typeIdx, worldX, existingBrick){
    const t = BRICK_TYPES[typeIdx];
    let colStart = colRangeFor(Math.round((worldX - BOARD_X) / UNIT - t.studs/2), t.studs);
    let maxH = 0;
    for(let i=0;i<t.studs;i++) maxH = Math.max(maxH, columns[colStart+i].h);
    const brick = existingBrick || { type:t, typeIdx };
    brick.colStart = colStart;
    brick.y = maxH;
    for(let i=0;i<t.studs;i++){
      columns[colStart+i].h = maxH + t.h;
      columns[colStart+i].bricks.push(brick);
    }
    if(!existingBrick) allBricks.push(brick);
    return brick;
  }

  // Retire une brique de ses colonnes (pour la reprendre) et reconstruit proprement la pile
  function detachBrick(brick){
    allBricks = allBricks.filter(b=>b!==brick);
    rebuildColumnsFrom(allBricks);
  }
  function rebuildColumnsFrom(list){
    resetColumns();
    for(const b of list){
      let maxH = 0;
      for(let i=0;i<b.type.studs;i++) maxH = Math.max(maxH, columns[b.colStart+i].h);
      b.y = maxH;
      for(let i=0;i<b.type.studs;i++){
        columns[b.colStart+i].h = maxH + b.type.h;
        columns[b.colStart+i].bricks.push(b);
      }
    }
  }

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    allBricks = [];
    resetColumns();
  });

  // ---- Glisser pour poser (même principe que le puzzle) : on choisit la pièce, on glisse
  //      sur la plaque, un repère vert montre où elle va se poser, on relâche pour la poser.
  //      On peut aussi reprendre une pièce déjà posée si elle est au sommet de sa colonne. ----
  let placeDrag = null; // {x, pickedBrick|null}

  function topmostBrickAt(worldX){
    const col = Math.max(0, Math.min(BOARD_COLS-1, Math.floor((worldX - BOARD_X)/UNIT)));
    const c = columns[col];
    if(!c || !c.bricks.length) return null;
    return c.bricks[c.bricks.length-1];
  }

  canvas.addEventListener('pointerdown', (ev)=>{
    const rect = canvas.getBoundingClientRect();
    const px = ev.clientX - rect.left, py = ev.clientY - rect.top;
    if(py < BOARD_Y){
      const hit = topmostBrickAt(px);
      if(hit){
        const topOfCol = Math.abs((hit.y + hit.type.h) - columns[hit.colStart].h) < 1;
        if(topOfCol){
          detachBrick(hit);
          selectedIdx = hit.typeIdx;
          placeDrag = { x: px, pickedBrick: hit };
          return;
        }
      }
    }
    placeDrag = { x: px, pickedBrick: null };
  }, {passive:true});

  canvas.addEventListener('pointermove', (ev)=>{
    if(!placeDrag) return;
    const rect = canvas.getBoundingClientRect();
    placeDrag.x = ev.clientX - rect.left;
  }, {passive:true});

  function finishPlaceDrag(){
    if(!placeDrag) return;
    placeBrickAt(selectedIdx, placeDrag.x, placeDrag.pickedBrick);
    if(placeDrag.pickedBrick) allBricks.push(placeDrag.pickedBrick);
    placeDrag = null;
  }
  canvas.addEventListener('pointerup', finishPlaceDrag, {passive:true});
  canvas.addEventListener('pointercancel', ()=>{ placeDrag = null; }, {passive:true});

  // ---- Dessin ----
  function draw(){
    ctx.clearRect(0,0,CW,CH);

    if(bgReady){
      const bgScale = Math.max(CW/bgImg.width, BOARD_Y/bgImg.height);
      const bw = bgImg.width*bgScale, bh = bgImg.height*bgScale;
      ctx.drawImage(bgImg, (CW-bw)/2, BOARD_Y - bh, bw, bh);
    } else {
      ctx.fillStyle = '#bfe6ff';
      ctx.fillRect(0,0,CW, BOARD_Y);
    }

    ctx.fillStyle = '#6fae4a';
    ctx.fillRect(0, BOARD_Y, CW, CH - BOARD_Y);
    ctx.fillStyle = '#4f9a3a';
    ctx.fillRect(BOARD_X, BOARD_Y - 6, BOARD_W_PX, 6);

    const sorted = [...allBricks].sort((a,b)=> a.y - b.y);
    for(const b of sorted){
      const x = BOARD_X + b.colStart*UNIT;
      const y = BOARD_Y - b.y - b.type.h;
      drawBrick(ctx, b.type, x, y, 1);
    }

    drawGhost();
  }

  function drawGhost(){
    if(!placeDrag) return;
    const t = BRICK_TYPES[selectedIdx];
    if(!t.ready) return;
    let colStart = colRangeFor(Math.round((placeDrag.x - BOARD_X) / UNIT - t.studs/2), t.studs);
    let maxH = 0;
    for(let i=0;i<t.studs;i++) maxH = Math.max(maxH, columns[colStart+i].h);
    const gx = BOARD_X + colStart*UNIT;
    const gy = BOARD_Y - maxH - t.h;

    ctx.fillStyle = 'rgba(63,234,90,.35)';
    ctx.strokeStyle = '#3fea5a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(gx, gy, t.studs*UNIT, t.h, 6); else ctx.rect(gx, gy, t.studs*UNIT, t.h);
    ctx.fill(); ctx.stroke();

    ctx.save();
    ctx.globalAlpha = 0.85;
    drawBrick(ctx, t, gx, gy, 1);
    ctx.restore();
  }

  function loop(){
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
