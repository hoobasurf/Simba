<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Lego - Le Monde de Malo</title>
<style>
  html,body{ margin:0; padding:0; overflow:hidden; background:#bfe6ff; touch-action:manipulation; overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;-moz-user-select:none;-ms-user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; height:100%; }
  *{-webkit-tap-highlight-color:transparent; box-sizing:border-box;}
  ::selection{background:transparent;}
  #gameWrap{
    position:absolute; inset:0;
    overflow:hidden; background:linear-gradient(180deg,#bfe6ff,#eaf7ff 60%,#dff0d8);
  }
  canvas{ display:block; touch-action:none; }
  #backHome{
    position:absolute; top:14px; left:14px; z-index:40;
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.65); border:3px solid rgba(255,255,255,.9);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:900; color:#3a4a5a; text-decoration:none;
    box-shadow:0 4px 10px rgba(0,0,0,.25);
  }
  #backHome:active{ background:rgba(255,255,255,.9); transform:scale(.94); }

  #resetBtn{
    position:absolute; top:14px; right:14px; z-index:40;
    background:linear-gradient(180deg,#ff9d6a,#e6612c);
    color:#fff; border:3px solid #fff; border-radius:24px;
    padding:10px 16px; font-size:clamp(12px,3vw,15px); font-weight:900;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
    box-shadow:0 5px 12px rgba(0,0,0,.3);
  }
  #resetBtn:active{ transform:scale(.95); }

  #tray{
    position:absolute; left:0; bottom:0; width:100%; z-index:50;
    display:flex; flex-wrap:wrap; align-content:center; align-items:center; justify-content:center; gap:10px;
    padding:10px 10px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg, rgba(20,40,70,.5), rgba(20,40,70,.1));
    border-top:3px dashed rgba(255,255,255,.6);
    box-sizing:border-box;
  }
  .pieceBtn{
    flex:0 0 auto; border-radius:16px;
    background:rgba(255,255,255,.92); border:3px solid #fff;
    box-shadow:0 4px 8px rgba(0,0,0,.3);
    display:flex; align-items:center; justify-content:center;
    touch-action:none;
  }
  .pieceBtn.dragSource{ opacity:.35; }
</style>
</head>
<body>
<div id="gameWrap">
  <a id="backHome" href="index.html">←</a>
  <button id="resetBtn">🗑️ Effacer</button>
  <canvas id="game"></canvas>
  <div id="tray"></div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let CW=0, CH=0;

  function fitCanvas(){
    const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
    CW = window.innerWidth; CH = window.innerHeight;
    canvas.style.width = CW+'px'; canvas.style.height = CH+'px';
    canvas.width = CW*dpr; canvas.height = CH*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  fitCanvas();
  window.addEventListener('resize', ()=>{ fitCanvas(); computeLayout(); });
  window.addEventListener('orientationchange', ()=>{ fitCanvas(); computeLayout(); });

  // ---- Fond du jeu : image fixe (le ciel/paysage), pas de défilement ----
  const bgImg = new Image();
  bgImg.src = 'images/lego_bg.jpg';
  let bgReady = false;
  bgImg.onload = ()=>{ bgReady = true; };

  // ---- Pièces DESSINÉES (pas des photos) : formes géométriques pures, donc TOUJOURS
  //      parfaitement rectangulaires -> l'emboîtement est garanti à 100%, sans exception,
  //      quelle que soit la pièce. Peu de choix, pour rester simple pour un enfant de 4 ans. ----
  const COLORS = {
    red:   {top:'#ff6b5c', side:'#e0483a', dark:'#b8291d'},
    blue:  {top:'#5aa9ff', side:'#2f7de0', dark:'#1c5cb5'},
    yellow:{top:'#ffd94a', side:'#f0b400', dark:'#c98e00'},
    green: {top:'#7ee06a', side:'#4fae2c', dark:'#2f7d18'},
    white: {top:'#f7f7f7', side:'#dcdcdc', dark:'#b8b8b8'},
    brown: {top:'#c98a4f', side:'#a5692f', dark:'#7d4e20'},
  };
  const BRICK_TYPES = [
    {shape:'brick', color:'red',    studs:2},
    {shape:'brick', color:'blue',   studs:2},
    {shape:'brick', color:'yellow', studs:2},
    {shape:'brick', color:'green',  studs:2},
    {shape:'brick', color:'red',    studs:4},
    {shape:'brick', color:'blue',   studs:4},
    {shape:'roof',  color:'red',    studs:2},
    {shape:'roof',  color:'yellow', studs:2},
    {shape:'window', color:'white', studs:2},
    {shape:'door',   color:'brown', studs:2},
    {shape:'tree',   color:'green', studs:2},
    {shape:'flower', color:'red',   studs:1},
  ];
  BRICK_TYPES.forEach(t=>{ t.ready = true; t.w = 0; t.h = 0; });

  let UNIT, BOARD_COLS, BOARD_X, BOARD_Y, BOARD_W_PX;
  let TRAY_THUMB = 76;

  function computeBrickPixelSize(t){
    // Largeur TOUJOURS un multiple exact de UNIT (studs entiers) : deux pièces posées
    // côte à côte se touchent donc pile, sans jamais le moindre décalage.
    t.w = t.studs * UNIT;
    t.h = Math.round(UNIT * 0.85);
  }

  function computeLayout(){
    const availW = Math.max(260, window.innerWidth - 20);

    UNIT = Math.max(30, Math.min(50, Math.floor(availW / 10)));
    BOARD_COLS = Math.max(6, Math.floor((window.innerWidth - 20) / UNIT));
    BOARD_W_PX = BOARD_COLS * UNIT;
    BOARD_X = Math.round((window.innerWidth - BOARD_W_PX) / 2);

    // Peu de pièces (8) : tout tient facilement sur 2 lignes, sans jamais surcharger l'écran.
    TRAY_THUMB = Math.max(64, Math.min(84, Math.floor(availW / 5)));
    const itemsPerRow = Math.max(4, Math.floor((availW - 20) / (TRAY_THUMB+10)));
    const rows = Math.ceil(BRICK_TYPES.length / itemsPerRow);
    const trayH = rows*(TRAY_THUMB+14) + 16;
    BOARD_Y = window.innerHeight - trayH - Math.round(window.innerHeight * 0.08);

    BRICK_TYPES.forEach(computeBrickPixelSize);
    trayBtns.forEach(btn=>{ btn._sizeThumb(); btn._paintThumb(); });
    document.getElementById('tray').style.height = trayH + 'px';
  }

  // ---- Dessin d'une brique : toujours un rectangle net (+plots), jamais de contour flou ----
  function drawBrick(g, type, x, topY, scale){
    scale = scale || 1;
    const c = COLORS[type.color];
    const w = type.w*scale, h = type.h*scale;
    const studR = Math.min(UNIT*scale*0.19, h*0.22);
    g.save();
    g.translate(x, topY);

    // ombre portée douce au sol, sous la pièce
    g.fillStyle = 'rgba(0,0,0,.18)';
    g.beginPath();
    g.ellipse(w/2, h*1.02, w*0.46, h*0.08, 0, 0, Math.PI*2);
    g.fill();

    if(type.shape === 'tree'){
      g.fillStyle = '#a5692f';
      g.fillRect(w*0.42, h*0.55, w*0.16, h*0.45);
      g.strokeStyle = 'rgba(0,0,0,.3)'; g.lineWidth = 1.4;
      g.strokeRect(w*0.42, h*0.55, w*0.16, h*0.45);
      g.fillStyle = '#4fae2c';
      g.beginPath();
      g.moveTo(w*0.5, -h*0.35);
      g.lineTo(w*0.95, h*0.35);
      g.lineTo(w*0.05, h*0.35);
      g.closePath(); g.fill(); g.stroke();
      g.beginPath();
      g.moveTo(w*0.5, -h*0.05);
      g.lineTo(w*0.85, h*0.55);
      g.lineTo(w*0.15, h*0.55);
      g.closePath(); g.fill(); g.stroke();
      g.restore();
      return;
    }
    if(type.shape === 'flower'){
      g.fillStyle = '#4fae2c';
      g.fillRect(w*0.42, h*0.35, w*0.16, h*0.65);
      const petalColor = '#ff6b9c';
      g.fillStyle = petalColor;
      g.strokeStyle = 'rgba(0,0,0,.3)'; g.lineWidth = 1.2;
      const cx = w/2, cy = h*0.25, pr = w*0.24;
      for(let i=0;i<5;i++){
        const a = i*(Math.PI*2/5);
        g.beginPath();
        g.ellipse(cx+Math.cos(a)*pr*0.7, cy+Math.sin(a)*pr*0.7, pr*0.5, pr*0.32, a, 0, Math.PI*2);
        g.fill(); g.stroke();
      }
      g.fillStyle = '#ffd94a';
      g.beginPath(); g.arc(cx, cy, pr*0.4, 0, Math.PI*2); g.fill(); g.stroke();
      g.restore();
      return;
    }

    g.fillStyle = c.side;
    g.fillRect(0, h*0.24, w, h*0.76);
    g.strokeStyle = 'rgba(0,0,0,.35)';
    g.lineWidth = Math.max(1.2, w*0.018);
    g.strokeRect(0, h*0.24, w, h*0.76);
    g.fillStyle = c.top;
    if(type.shape === 'roof'){
      g.beginPath();
      g.moveTo(0, h*0.24);
      g.lineTo(w/2, -h*0.35);
      g.lineTo(w, h*0.24);
      g.closePath(); g.fill(); g.stroke();
    } else if(type.shape === 'window'){
      g.fillRect(0, 0, w, h*0.28);
      g.strokeRect(0, 0, w, h*0.28);
      g.fillStyle = c.dark;
      g.fillRect(w-Math.max(3,w*0.04), h*0.24, Math.max(3,w*0.04), h*0.76);
      // vitre bleue avec croisillon
      g.fillStyle = '#bfe6ff';
      g.fillRect(w*0.18, h*0.36, w*0.64, h*0.5);
      g.strokeStyle = '#fff'; g.lineWidth = Math.max(2, w*0.035);
      g.beginPath();
      g.moveTo(w*0.5, h*0.36); g.lineTo(w*0.5, h*0.86);
      g.moveTo(w*0.18, h*0.61); g.lineTo(w*0.82, h*0.61);
      g.stroke();
      g.strokeStyle = 'rgba(0,0,0,.4)'; g.lineWidth = Math.max(1.2, w*0.02);
      g.strokeRect(w*0.18, h*0.36, w*0.64, h*0.5);
    } else if(type.shape === 'door'){
      g.fillRect(0, 0, w, h*0.28);
      g.strokeRect(0, 0, w, h*0.28);
      g.fillStyle = c.dark;
      g.fillRect(w-Math.max(3,w*0.04), h*0.24, Math.max(3,w*0.04), h*0.76);
      g.fillStyle = '#e8c99a';
      g.beginPath();
      const dx=w*0.2, dy=h*0.32, dw=w*0.6, dh=h*0.62;
      g.moveTo(dx, dy+dh);
      g.lineTo(dx, dy+dh*0.3);
      g.quadraticCurveTo(dx, dy, dx+dw/2, dy);
      g.quadraticCurveTo(dx+dw, dy, dx+dw, dy+dh*0.3);
      g.lineTo(dx+dw, dy+dh);
      g.closePath(); g.fill();
      g.strokeStyle = 'rgba(0,0,0,.4)'; g.lineWidth = Math.max(1.2, w*0.02);
      g.stroke();
      g.fillStyle = c.dark;
      g.beginPath(); g.arc(dx+dw*0.78, dy+dh*0.6, Math.max(2,w*0.035), 0, Math.PI*2); g.fill();
    } else {
      g.fillRect(0, 0, w, h*0.28);
      g.strokeRect(0, 0, w, h*0.28);
      g.fillStyle = c.dark;
      g.fillRect(w-Math.max(3,w*0.04), h*0.24, Math.max(3,w*0.04), h*0.76);
      g.fillStyle = c.top;
      const nStuds = type.studs;
      for(let i=0;i<nStuds;i++){
        const sx = (i+0.5) * (w/nStuds);
        g.beginPath();
        g.ellipse(sx, -studR*0.5, studR, studR*0.6, 0, 0, Math.PI*2);
        g.fill();
        g.strokeStyle = 'rgba(0,0,0,.3)'; g.lineWidth = Math.max(1, w*0.014);
        g.stroke();
        g.fillStyle = c.side;
        g.fillRect(sx-studR*0.7, -studR*0.5, studR*1.4, studR*0.85);
        g.fillStyle = c.top;
      }
    }
    g.fillStyle = 'rgba(255,255,255,.25)';
    g.fillRect(0, h*0.24, w, Math.max(2,3*scale));
    g.restore();
  }

  // ---- Palette (pioche) : glisser une pièce directement depuis sa vignette jusqu'à la
  //      plaque, en un seul geste fluide — pas de clic séparé, comme le puzzle. ----
  const tray = document.getElementById('tray');
  let selectedIdx = 0;
  const trayBtns = [];

  BRICK_TYPES.forEach((t, idx)=>{
    const btn = document.createElement('div');
    btn.className = 'pieceBtn';
    const c = document.createElement('canvas');
    function sizeThumb(){
      const dpr = Math.max(1, Math.min(window.devicePixelRatio||1, 3));
      const s = TRAY_THUMB;
      btn.style.width = s+'px'; btn.style.height = s+'px';
      c.width = s*dpr; c.height = s*dpr; c.style.width=s+'px'; c.style.height=s+'px';
    }
    const g = c.getContext('2d');
    function paintThumb(){
      const dpr = Math.max(1, Math.min(window.devicePixelRatio||1, 3));
      const s = TRAY_THUMB;
      g.setTransform(dpr,0,0,dpr,0,0);
      g.clearRect(0,0,s,s);
      const sc = Math.min((s-16)/t.w, (s-16)/(t.h*1.5));
      drawBrick(g, t, s/2 - (t.w*sc)/2, s/2 - (t.h*sc)/2 + t.h*sc*0.2, sc);
    }
    sizeThumb();
    btn.appendChild(c);
    btn.addEventListener('pointerdown', (ev)=>{
      ev.preventDefault();
      startDragFromTray(idx, btn, ev);
    }, {passive:false});
    tray.appendChild(btn);
    btn._paintThumb = paintThumb;
    btn._sizeThumb = sizeThumb;
    trayBtns.push(btn);
  });

  computeLayout();
  trayBtns.forEach(b=>b._paintThumb());

  // ---- Colonnes de la plaque : chaque colonne empile ses briques indépendamment.
  //      colStart est TOUJOURS un entier -> deux pièces voisines occupent des colonnes
  //      consécutives et se touchent donc pixel pour pixel, jamais de décalage. ----
  let columns = [];
  function resetColumns(){ columns = Array.from({length: BOARD_COLS}, ()=> ({ h: 0, bricks: [] })); }
  resetColumns();
  let allBricks = [];

  function colRangeFor(colStart, studs){
    return Math.max(0, Math.min(BOARD_COLS - studs, Math.round(colStart)));
  }

  function placeBrickAt(typeIdx, worldX, existingBrick){
    const t = BRICK_TYPES[typeIdx];
    let colStart = colRangeFor(Math.round((worldX - BOARD_X) / UNIT - t.studs/2), t.studs);
    let maxH = 0;
    for(let i=0;i<t.studs;i++) maxH = Math.max(maxH, columns[colStart+i].h);
    const brick = existingBrick || { type:t, typeIdx };
    brick.colStart = colStart;
    brick.y = maxH;
    for(let i=0;i<t.studs;i++){
      columns[colStart+i].h = maxH + t.h;
      columns[colStart+i].bricks.push(brick);
    }
    if(!existingBrick) allBricks.push(brick);
    return brick;
  }

  function detachBrick(brick){
    allBricks = allBricks.filter(b=>b!==brick);
    rebuildColumnsFrom(allBricks);
  }
  function rebuildColumnsFrom(list){
    resetColumns();
    for(const b of list){
      let maxH = 0;
      for(let i=0;i<b.type.studs;i++) maxH = Math.max(maxH, columns[b.colStart+i].h);
      b.y = maxH;
      for(let i=0;i<b.type.studs;i++){
        columns[b.colStart+i].h = maxH + b.type.h;
        columns[b.colStart+i].bricks.push(b);
      }
    }
  }

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    allBricks = [];
    resetColumns();
  });

  // ---- Glisser depuis la pioche : UN SEUL geste (appui -> déplacement -> relâchement) ----
  let placeDrag = null;

  function updateGhostFromEvent(ev){
    const rect = canvas.getBoundingClientRect();
    placeDrag.x = ev.clientX - rect.left;
    placeDrag.y = ev.clientY - rect.top;
  }

  function startDragFromTray(idx, btn, ev){
    selectedIdx = idx;
    btn.classList.add('dragSource');
    placeDrag = { x:0, y:0, pickedBrick: null };
    updateGhostFromEvent(ev);

    function onMove(e){ updateGhostFromEvent(e); }
    function onUp(e){
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onCancel);
      btn.classList.remove('dragSource');
      updateGhostFromEvent(e);
      if(placeDrag && placeDrag.y < BOARD_Y){
        placeBrickAt(selectedIdx, placeDrag.x, null);
      }
      placeDrag = null;
    }
    function onCancel(){
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onCancel);
      btn.classList.remove('dragSource');
      placeDrag = null;
    }
    window.addEventListener('pointermove', onMove, {passive:true});
    window.addEventListener('pointerup', onUp, {passive:true});
    window.addEventListener('pointercancel', onCancel, {passive:true});
  }

  // ---- Reprendre une pièce déjà posée (si elle est accessible, au sommet de sa colonne) ----
  function topmostBrickAt(worldX){
    const col = Math.max(0, Math.min(BOARD_COLS-1, Math.floor((worldX - BOARD_X)/UNIT)));
    const c = columns[col];
    if(!c || !c.bricks.length) return null;
    return c.bricks[c.bricks.length-1];
  }

  canvas.addEventListener('pointerdown', (ev)=>{
    const rect = canvas.getBoundingClientRect();
    const px = ev.clientX - rect.left, py = ev.clientY - rect.top;
    if(py >= BOARD_Y) return;
    const hit = topmostBrickAt(px);
    if(hit){
      const topOfCol = Math.abs((hit.y + hit.type.h) - columns[hit.colStart].h) < 1;
      if(topOfCol){
        detachBrick(hit);
        selectedIdx = hit.typeIdx;
        placeDrag = { x: px, y: py, pickedBrick: hit };

        function onMove(e){ updateGhostFromEvent(e); }
        function onUp(e){
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          window.removeEventListener('pointercancel', onCancel);
          updateGhostFromEvent(e);
          if(placeDrag){
            placeBrickAt(selectedIdx, placeDrag.x, placeDrag.pickedBrick);
            allBricks.push(placeDrag.pickedBrick);
          }
          placeDrag = null;
        }
        function onCancel(){
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          window.removeEventListener('pointercancel', onCancel);
          if(placeDrag && placeDrag.pickedBrick){
            placeBrickAt(selectedIdx, placeDrag.x, placeDrag.pickedBrick);
            allBricks.push(placeDrag.pickedBrick);
          }
          placeDrag = null;
        }
        window.addEventListener('pointermove', onMove, {passive:true});
        window.addEventListener('pointerup', onUp, {passive:true});
        window.addEventListener('pointercancel', onCancel, {passive:true});
      }
    }
  }, {passive:true});

  // ---- Dessin ----
  function draw(){
    ctx.clearRect(0,0,CW,CH);

    if(bgReady){
      const bgScale = Math.max(CW/bgImg.width, BOARD_Y/bgImg.height);
      const bw = bgImg.width*bgScale, bh = bgImg.height*bgScale;
      ctx.drawImage(bgImg, (CW-bw)/2, BOARD_Y - bh, bw, bh);
    } else {
      ctx.fillStyle = '#bfe6ff';
      ctx.fillRect(0,0,CW, BOARD_Y);
    }

    ctx.fillStyle = '#6fae4a';
    ctx.fillRect(0, BOARD_Y, CW, CH - BOARD_Y);
    ctx.fillStyle = '#4f9a3a';
    ctx.fillRect(BOARD_X, BOARD_Y - 6, BOARD_W_PX, 6);

    const sorted = [...allBricks].sort((a,b)=> a.y - b.y);
    for(const b of sorted){
      const x = BOARD_X + b.colStart*UNIT;
      const y = BOARD_Y - b.y - b.type.h;
      drawBrick(ctx, b.type, x, y, 1);
    }

    drawGhost();
  }

  function drawGhost(){
    if(!placeDrag) return;
    const t = BRICK_TYPES[selectedIdx];

    if(placeDrag.y >= BOARD_Y){
      ctx.save();
      ctx.globalAlpha = 0.9;
      drawBrick(ctx, t, placeDrag.x - t.w/2, placeDrag.y - t.h/2, 1);
      ctx.restore();
      return;
    }

    let colStart = colRangeFor(Math.round((placeDrag.x - BOARD_X) / UNIT - t.studs/2), t.studs);
    let maxH = 0;
    for(let i=0;i<t.studs;i++) maxH = Math.max(maxH, columns[colStart+i].h);
    const gx = BOARD_X + colStart*UNIT;
    const gy = BOARD_Y - maxH - t.h;

    ctx.fillStyle = 'rgba(63,234,90,.35)';
    ctx.strokeStyle = '#3fea5a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(gx, gy, t.studs*UNIT, t.h, 6); else ctx.rect(gx, gy, t.studs*UNIT, t.h);
    ctx.fill(); ctx.stroke();

    ctx.save();
    ctx.globalAlpha = 0.95;
    drawBrick(ctx, t, gx, gy, 1);
    ctx.restore();
  }

  function loop(){
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
