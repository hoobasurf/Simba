<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Lego - Le Monde de Malo</title>
<style>
  html,body{ margin:0; padding:0; overflow:hidden; background:#bfe6ff; touch-action:manipulation; overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;-moz-user-select:none;-ms-user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; height:100%; }
  *{-webkit-tap-highlight-color:transparent; box-sizing:border-box;}
  ::selection{background:transparent;}
  #gameWrap{
    position:absolute; inset:0;
    overflow:hidden; background:linear-gradient(180deg,#bfe6ff,#eaf7ff 60%,#dff0d8);
  }
  canvas{ display:block; touch-action:none; }
  #backHome{
    position:absolute; top:14px; left:14px; z-index:40;
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.65); border:3px solid rgba(255,255,255,.9);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:900; color:#3a4a5a; text-decoration:none;
    box-shadow:0 4px 10px rgba(0,0,0,.25);
  }
  #backHome:active{ background:rgba(255,255,255,.9); transform:scale(.94); }

  #hint{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85); border-radius:20px; padding:8px 18px;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
    font-size:clamp(11px,3vw,14px); font-weight:800; color:#3a4a5a;
    box-shadow:0 4px 10px rgba(0,0,0,.2); z-index:30; text-align:center; white-space:nowrap;
  }

  #resetBtn{
    position:absolute; top:14px; right:14px; z-index:40;
    background:linear-gradient(180deg,#ff9d6a,#e6612c);
    color:#fff; border:3px solid #fff; border-radius:24px;
    padding:10px 16px; font-size:clamp(12px,3vw,15px); font-weight:900;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
    box-shadow:0 5px 12px rgba(0,0,0,.3);
  }
  #resetBtn:active{ transform:scale(.95); }

  #tray{
    position:absolute; left:0; bottom:0; width:100%; z-index:50;
    display:flex; flex-wrap:wrap; align-content:flex-start; align-items:flex-start; justify-content:center; gap:6px;
    padding:26px 10px calc(8px + env(safe-area-inset-bottom)) 10px;
    overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y;
    background:linear-gradient(0deg, rgba(20,40,70,.45), rgba(20,40,70,0) 90%);
    border-top:3px dashed rgba(255,255,255,.6);
    box-sizing:border-box;
  }
  .trayLabel{
    position:absolute; top:4px; left:0; width:100%; text-align:center;
    color:#fff; font-weight:900; font-size:12px; text-shadow:0 2px 3px rgba(0,0,0,.35);
  }
  .pieceBtn{
    flex:0 0 auto; border-radius:12px;
    background:rgba(255,255,255,.9); border:3px solid #fff;
    box-shadow:0 4px 8px rgba(0,0,0,.3);
    display:flex; align-items:center; justify-content:center;
    touch-action:none;
  }
  .pieceBtn.selected{ border-color:#3fea5a; box-shadow:0 0 0 4px rgba(63,234,90,.6), 0 4px 8px rgba(0,0,0,.3); }
  .pieceBtn.dragSource{ opacity:.35; }
</style>
</head>
<body>
<div id="gameWrap">
  <a id="backHome" href="index.html">←</a>
  <div id="hint">👆 Glisse une pièce de la pioche jusqu'à la plaque</div>
  <button id="resetBtn">🗑️ Effacer</button>
  <canvas id="game"></canvas>
  <div id="tray">
    <div class="trayLabel">🧺 Pioche</div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let CW=0, CH=0;

  function fitCanvas(){
    const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
    CW = window.innerWidth; CH = window.innerHeight;
    canvas.style.width = CW+'px'; canvas.style.height = CH+'px';
    canvas.width = CW*dpr; canvas.height = CH*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  fitCanvas();
  window.addEventListener('resize', ()=>{ fitCanvas(); computeLayout(); });
  window.addEventListener('orientationchange', ()=>{ fitCanvas(); computeLayout(); });

  // ---- Fond du jeu : image fixe, pas de défilement ----
  const bgImg = new Image();
  bgImg.src = 'images/lego_bg.jpg';
  let bgReady = false;
  bgImg.onload = ()=>{ bgReady = true; };

  // ---- Pièces Lego : toutes les pièces découpées dans les 2 planches fournies ----
  const PIECE_DEFS = [
    {file:'piece_lego_brique_rouge.png', studs:2},
    {file:'piece_lego_brique_bleue.png', studs:2},
    {file:'piece_lego_brique_jaune.png', studs:2},
    {file:'piece_lego_brique_verte.png', studs:2},
    {file:'piece_lego_brique_blanche.png', studs:2},
    {file:'piece_lego_toit_bleu.png', studs:2},
    {file:'piece_lego_toit_rouge.png', studs:2},
    {file:'piece_lego_toit33b.png', studs:2},
    {file:'piece_lego_arbre_tronc.png', studs:2},
    {file:'piece_lego_feuillage.png', studs:2},
    {file:'piece_lego_arbre40.png', studs:2},
    {file:'piece_lego_fenetre3.png', studs:2},
    {file:'piece_lego_fenetre40.png', studs:2},
    {file:'piece_lego_porte3.png', studs:2},
    {file:'piece_lego_porte40.png', studs:2},
    {file:'piece_lego_cloture3.png', studs:3},
    {file:'piece_lego_cloture40.png', studs:3},
    {file:'piece_lego_rocher3.png', studs:2},
    {file:'piece_lego_rocher40.png', studs:2},
    {file:'piece_lego_fleur3.png', studs:1},
    {file:'piece_lego_fleur40.png', studs:1},
    {file:'piece_lego_dinosaure3.png', studs:3},
    {file:'piece_lego_dinosaure40.png', studs:3},
    {file:'piece_lego_personnage3.png', studs:1},
    {file:'piece_lego_eau3.png', studs:2},
    {file:'piece_lego_marche3.png', studs:2},
    {file:'piece_lego_nuage3.png', studs:2},
    {file:'piece_lego_plaque2x2.png', studs:2},
    {file:'piece_lego_plaque4x4.png', studs:3},
    {file:'piece_lego_plaque_verte.png', studs:2},
    {file:'piece_lego_plaquefine2x4.png', studs:2},
    {file:'piece_lego_pente45.png', studs:2},
    {file:'piece_lego_arche40.png', studs:2},
    {file:'piece_lego_banc40.png', studs:2},
    {file:'piece_lego_escalier40.png', studs:2},
    {file:'piece_lego_voiture40.png', studs:3},
    {file:'piece_lego_brique2x2b.png', studs:2},
    {file:'piece_lego_brique2x4b.png', studs:2},
    {file:'piece_lego_brique2x8b.png', studs:2},
    {file:'piece_lego_chat40.png', studs:2},
    {file:'piece_lego_cheval40.png', studs:2},
    {file:'piece_lego_chien40.png', studs:2},
  ];

  // ---- Disposition : plateau fixe (ne bouge jamais). L'unité de grille (UNIT) est LA
  //      référence unique utilisée à la fois pour la position et la taille des pièces :
  //      ça garantit un emboîtement pixel-parfait, sans aucun décalage possible. ----
  let UNIT, BOARD_COLS, BOARD_X, BOARD_Y, BOARD_W_PX;
  let TRAY_THUMB = 76;
  const BRICK_TYPES = PIECE_DEFS.map(def=>{
    const img = new Image();
    img.src = 'images/' + def.file;
    return { img, studs: def.studs, w: 0, h: 0, ready:false, naturalRatio: 1 };
  });
  BRICK_TYPES.forEach(t=>{
    t.img.onload = ()=>{
      t.ready = true;
      t.naturalRatio = t.img.naturalHeight / t.img.naturalWidth;
      computeBrickPixelSize(t);
    };
  });
  function computeBrickPixelSize(t){
    // Largeur TOUJOURS un multiple exact de UNIT (studs entiers) : c'est ce qui garantit
    // que deux pièces posées côte à côte se touchent exactement, sans jamais de décalage.
    t.w = Math.round(t.studs * UNIT);
    t.h = Math.round(t.w * t.naturalRatio);
  }

  function computeLayout(){
    const availW = Math.max(260, window.innerWidth - 20);

    UNIT = Math.max(28, Math.min(50, Math.floor(availW / 9)));
    BOARD_COLS = Math.max(6, Math.floor((window.innerWidth - 20) / UNIT));
    BOARD_W_PX = BOARD_COLS * UNIT;
    BOARD_X = Math.round((window.innerWidth - BOARD_W_PX) / 2);

    // Pioche : grille complète avec TOUTES les pièces (comme le puzzle), pas de pièce cachée.
    // On calcule la hauteur exacte nécessaire pour un nombre de colonnes raisonnable ; si ça
    // dépasse la place disponible, un scroll vertical (facile à découvrir) prend le relais.
    const labelH = 22, pad = 10, gap = 6;
    TRAY_THUMB = Math.max(40, Math.min(60, Math.floor(availW / 7)));
    const itemsPerRow = Math.max(4, Math.floor((availW - 2*pad) / (TRAY_THUMB+gap)));
    const rows = Math.ceil(BRICK_TYPES.length / itemsPerRow);
    let trayH = labelH + rows*(TRAY_THUMB+gap) + 2*pad;
    trayH = Math.min(trayH, window.innerHeight * 0.46); // au-delà, ça défile verticalement
    trayH = Math.max(trayH, 130);
    BOARD_Y = window.innerHeight - trayH;

    BRICK_TYPES.forEach(computeBrickPixelSize);
    trayBtns.forEach(btn=>{ btn._sizeThumb(); btn._paintThumb(); });
    document.getElementById('tray').style.height = trayH + 'px';
  }

  function drawBrick(g, type, x, topY, scale){
    if(!type.ready) return;
    scale = scale || 1;
    g.drawImage(type.img, x, topY, type.w*scale, type.h*scale);
  }

  // ---- Palette (pioche) : glisser une pièce directement depuis sa vignette jusqu'à la
  //      plaque, en un seul geste fluide (comme le puzzle) — pas de clic séparé. ----
  const tray = document.getElementById('tray');
  let selectedIdx = 0;
  const trayBtns = [];

  BRICK_TYPES.forEach((t, idx)=>{
    const btn = document.createElement('div');
    btn.className = 'pieceBtn';
    const c = document.createElement('canvas');
    function sizeThumb(){
      const dpr = Math.max(1, Math.min(window.devicePixelRatio||1, 3));
      const s = TRAY_THUMB;
      btn.style.width = s+'px'; btn.style.height = s+'px';
      c.width = s*dpr; c.height = s*dpr; c.style.width=s+'px'; c.style.height=s+'px';
    }
    const g = c.getContext('2d');
    function paintThumb(){
      const dpr = Math.max(1, Math.min(window.devicePixelRatio||1, 3));
      const s = TRAY_THUMB;
      g.setTransform(dpr,0,0,dpr,0,0);
      g.clearRect(0,0,s,s);
      if(t.ready){
        const sc = Math.min((s-10)/t.w, (s-10)/t.h);
        drawBrick(g, t, s/2 - (t.w*sc)/2, s/2 - (t.h*sc)/2, sc);
      }
    }
    sizeThumb();
    t.img.addEventListener('load', paintThumb);
    paintThumb();
    btn.appendChild(c);
    btn.addEventListener('pointerdown', (ev)=>{
      ev.preventDefault();
      startDragFromTray(idx, btn, ev);
    }, {passive:false});
    tray.appendChild(btn);
    btn._paintThumb = paintThumb;
    btn._sizeThumb = sizeThumb;
    trayBtns.push(btn);
  });

  computeLayout();

  // ---- Colonnes de la plaque : chaque colonne empile ses briques indépendamment.
  //      colStart est TOUJOURS un entier -> deux pièces voisines occupent des colonnes
  //      consécutives et se touchent donc pixel pour pixel, jamais de décalage. ----
  let columns = [];
  function resetColumns(){ columns = Array.from({length: BOARD_COLS}, ()=> ({ h: 0, bricks: [] })); }
  resetColumns();
  let allBricks = [];

  function colRangeFor(colStart, studs){
    return Math.max(0, Math.min(BOARD_COLS - studs, Math.round(colStart)));
  }

  function placeBrickAt(typeIdx, worldX, existingBrick){
    const t = BRICK_TYPES[typeIdx];
    let colStart = colRangeFor(Math.round((worldX - BOARD_X) / UNIT - t.studs/2), t.studs);
    let maxH = 0;
    for(let i=0;i<t.studs;i++) maxH = Math.max(maxH, columns[colStart+i].h);
    const brick = existingBrick || { type:t, typeIdx };
    brick.colStart = colStart;
    brick.y = maxH;
    for(let i=0;i<t.studs;i++){
      columns[colStart+i].h = maxH + t.h;
      columns[colStart+i].bricks.push(brick);
    }
    if(!existingBrick) allBricks.push(brick);
    return brick;
  }

  function detachBrick(brick){
    allBricks = allBricks.filter(b=>b!==brick);
    rebuildColumnsFrom(allBricks);
  }
  function rebuildColumnsFrom(list){
    resetColumns();
    for(const b of list){
      let maxH = 0;
      for(let i=0;i<b.type.studs;i++) maxH = Math.max(maxH, columns[b.colStart+i].h);
      b.y = maxH;
      for(let i=0;i<b.type.studs;i++){
        columns[b.colStart+i].h = maxH + b.type.h;
        columns[b.colStart+i].bricks.push(b);
      }
    }
  }

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    allBricks = [];
    resetColumns();
  });

  // ---- Glisser depuis la pioche : UN SEUL geste (appui -> déplacement -> relâchement),
  //      exactement comme le puzzle. Le fantôme suit le doigt même hors du canvas. ----
  let placeDrag = null; // {x, y, pickedBrick|null}

  function updateGhostFromEvent(ev){
    const rect = canvas.getBoundingClientRect();
    placeDrag.x = ev.clientX - rect.left;
    placeDrag.y = ev.clientY - rect.top;
  }

  function startDragFromTray(idx, btn, ev){
    selectedIdx = idx;
    trayBtns.forEach(b=>{ b.classList.remove('selected'); b.classList.remove('dragSource'); });
    btn.classList.add('selected');
    btn.classList.add('dragSource');
    placeDrag = { x:0, y:0, pickedBrick: null };
    updateGhostFromEvent(ev);

    function onMove(e){ updateGhostFromEvent(e); }
    function onUp(e){
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onCancel);
      btn.classList.remove('dragSource');
      updateGhostFromEvent(e);
      if(placeDrag && placeDrag.y < BOARD_Y){
        placeBrickAt(selectedIdx, placeDrag.x, null);
      }
      placeDrag = null;
    }
    function onCancel(){
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onCancel);
      btn.classList.remove('dragSource');
      placeDrag = null;
    }
    window.addEventListener('pointermove', onMove, {passive:true});
    window.addEventListener('pointerup', onUp, {passive:true});
    window.addEventListener('pointercancel', onCancel, {passive:true});
  }

  // ---- Reprendre une pièce déjà posée (si elle est accessible, au sommet de sa colonne) ----
  function topmostBrickAt(worldX){
    const col = Math.max(0, Math.min(BOARD_COLS-1, Math.floor((worldX - BOARD_X)/UNIT)));
    const c = columns[col];
    if(!c || !c.bricks.length) return null;
    return c.bricks[c.bricks.length-1];
  }

  canvas.addEventListener('pointerdown', (ev)=>{
    const rect = canvas.getBoundingClientRect();
    const px = ev.clientX - rect.left, py = ev.clientY - rect.top;
    if(py >= BOARD_Y) return; // la pioche gère elle-même ses propres pointerdown
    const hit = topmostBrickAt(px);
    if(hit){
      const topOfCol = Math.abs((hit.y + hit.type.h) - columns[hit.colStart].h) < 1;
      if(topOfCol){
        detachBrick(hit);
        selectedIdx = hit.typeIdx;
        placeDrag = { x: px, y: py, pickedBrick: hit };

        function onMove(e){ updateGhostFromEvent(e); }
        function onUp(e){
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          window.removeEventListener('pointercancel', onCancel);
          updateGhostFromEvent(e);
          if(placeDrag){
            placeBrickAt(selectedIdx, placeDrag.x, placeDrag.pickedBrick);
            allBricks.push(placeDrag.pickedBrick);
          }
          placeDrag = null;
        }
        function onCancel(){
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          window.removeEventListener('pointercancel', onCancel);
          if(placeDrag && placeDrag.pickedBrick){
            placeBrickAt(selectedIdx, placeDrag.x, placeDrag.pickedBrick);
            allBricks.push(placeDrag.pickedBrick);
          }
          placeDrag = null;
        }
        window.addEventListener('pointermove', onMove, {passive:true});
        window.addEventListener('pointerup', onUp, {passive:true});
        window.addEventListener('pointercancel', onCancel, {passive:true});
      }
    }
  }, {passive:true});

  // ---- Dessin ----
  function draw(){
    ctx.clearRect(0,0,CW,CH);

    if(bgReady){
      const bgScale = Math.max(CW/bgImg.width, BOARD_Y/bgImg.height);
      const bw = bgImg.width*bgScale, bh = bgImg.height*bgScale;
      ctx.drawImage(bgImg, (CW-bw)/2, BOARD_Y - bh, bw, bh);
    } else {
      ctx.fillStyle = '#bfe6ff';
      ctx.fillRect(0,0,CW, BOARD_Y);
    }

    ctx.fillStyle = '#6fae4a';
    ctx.fillRect(0, BOARD_Y, CW, CH - BOARD_Y);
    ctx.fillStyle = '#4f9a3a';
    ctx.fillRect(BOARD_X, BOARD_Y - 6, BOARD_W_PX, 6);

    const sorted = [...allBricks].sort((a,b)=> a.y - b.y);
    for(const b of sorted){
      const x = BOARD_X + b.colStart*UNIT;
      const y = BOARD_Y - b.y - b.type.h;
      drawBrick(ctx, b.type, x, y, 1);
    }

    drawGhost();
  }

  function drawGhost(){
    if(!placeDrag) return;
    const t = BRICK_TYPES[selectedIdx];
    if(!t.ready) return;
    if(placeDrag.y >= BOARD_Y) return; // doigt encore dans la pioche : rien à montrer sur la plaque

    let colStart = colRangeFor(Math.round((placeDrag.x - BOARD_X) / UNIT - t.studs/2), t.studs);
    let maxH = 0;
    for(let i=0;i<t.studs;i++) maxH = Math.max(maxH, columns[colStart+i].h);
    const gx = BOARD_X + colStart*UNIT;
    const gy = BOARD_Y - maxH - t.h;

    ctx.fillStyle = 'rgba(63,234,90,.35)';
    ctx.strokeStyle = '#3fea5a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(gx, gy, t.studs*UNIT, t.h, 6); else ctx.rect(gx, gy, t.studs*UNIT, t.h);
    ctx.fill(); ctx.stroke();

    ctx.save();
    ctx.globalAlpha = 0.9;
    drawBrick(ctx, t, gx, gy, 1);
    ctx.restore();
  }

  function loop(){
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
