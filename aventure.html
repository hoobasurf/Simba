<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Le Monde de Malo - Prairie Enchantée</title>
<style>
  html,body{
    margin:0;padding:0;overflow:hidden;
    width:100%;height:100%;
    background:#7ec8f2;
    font-family:'Segoe UI', system-ui, sans-serif;
    touch-action:none; overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;-moz-user-select:none;-ms-user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent;
  }
  *{-webkit-tap-highlight-color:transparent;}
  ::selection{background:transparent;}
  #gameWrap{
    position:relative;
    width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    background:#8fd3ff;
  }
  canvas{
    display:block;
    background:#7ec8f2;
  }
  #missionBanner{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85);
    border-radius:20px; padding:8px 20px;
    font-size:clamp(14px,3.6vw,19px); font-weight:800; color:#3a5a2c;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
    z-index:11; white-space:nowrap; transition:transform .2s;
  }
  #hud{
    position:absolute; top:14px; left:14px; right:14px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none;
    font-weight:800; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.4);
    z-index:10;
  }
  #candyCounter{
    background:rgba(255,255,255,.55);
    border-radius:20px; padding:6px 14px;
    font-size:clamp(14px,3.5vw,18px);
    box-shadow:0 3px 6px rgba(0,0,0,.2);
    white-space:nowrap;
  }
  #progressBarWrap{
    flex:1; margin:6px 16px 0 16px;
    background:rgba(255,255,255,.35);
    border-radius:20px; height:14px; overflow:hidden;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.2);
  }
  #progressBar{
    height:100%; width:0%;
    background:linear-gradient(90deg,#ffd54a,#ff8a3d);
    border-radius:20px;
    transition:width .1s linear;
  }
  #startScreen, #winScreen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(180deg,#8fd3ff 0%,#c9f0ff 60%,#e8fff0 100%);
    z-index:30; text-align:center; padding:20px; box-sizing:border-box;
  }
  #winScreen{display:none;}
  .title{
    font-size:clamp(28px,6vw,48px);
    font-weight:900; color:#3a7d2c;
    text-shadow:3px 3px 0 #fff, 0 6px 10px rgba(0,0,0,.15);
    margin-bottom:10px;
  }
  .subtitle{ font-size:clamp(14px,3vw,18px); color:#2c5a24; margin-bottom:28px; font-weight:600;}
  .bigBtn{
    font-size:clamp(18px,4vw,24px); font-weight:800; color:#fff;
    background:linear-gradient(180deg,#ffd54a,#ff8a3d);
    border:none; border-radius:50px; padding:16px 46px;
    box-shadow:0 6px 0 #d9631c, 0 10px 20px rgba(0,0,0,.2);
    cursor:pointer; transition:transform .1s;
  }
  .bigBtn:active{ transform:translateY(4px); box-shadow:0 2px 0 #d9631c; }

  #controls{
    position:absolute; bottom:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:0 18px 22px 18px; box-sizing:border-box;
    z-index:20; pointer-events:none;
  }
  .dpad{ display:flex; gap:14px; pointer-events:auto; }
  .ctrlBtn{
    width:70px;height:70px; border-radius:50%;
    background:rgba(255,255,255,.55);
    border:3px solid rgba(255,255,255,.9);
    box-shadow:0 4px 10px rgba(0,0,0,.25), inset 0 2px 4px rgba(255,255,255,.6);
    display:flex; align-items:center; justify-content:center;
    font-size:30px; color:#3a4a5a; -webkit-tap-highlight-color:transparent;
  }
  .ctrlBtn:active{ background:rgba(255,255,255,.85); transform:scale(.94); }
  #jumpBtn{
    width:88px;height:88px;
    background:rgba(255,180,60,.75);
    border:3px solid #fff;
    font-size:32px; pointer-events:auto;
  }
  #jumpBtn:active{ background:rgba(255,150,30,.95); transform:scale(.94); }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game" width="900" height="500"></canvas>

  <div id="missionBanner">🍬 Trouve les bonbons !</div>
  <div id="hud">
    <div id="progressBarWrap"><div id="progressBar"></div></div>
    <div id="candyCounter">🍬 0/10 &nbsp; 🟡 0/3 &nbsp; 🟦 0/4</div>
  </div>

  <div id="startScreen">
    <div class="title">🌳 Le Monde de Malo 🌳</div>
    <div class="subtitle">La Prairie Enchantée</div>
    <button class="bigBtn" id="startBtn">▶ Jouer</button>
  </div>

  <div id="winScreen">
    <div class="title">🎉 Bravo Malo ! 🎉</div>
    <div class="subtitle">Tu as traversé la prairie !</div>
    <button class="bigBtn" id="replayBtn">↻ Rejouer</button>
  </div>

  <div id="controls">
    <div class="dpad">
      <div class="ctrlBtn" id="leftBtn">◀</div>
      <div class="ctrlBtn" id="rightBtn">▶</div>
    </div>
    <div id="jumpBtn" class="ctrlBtn">⤒</div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Le jeu est VRAIMENT responsive : le canvas fait exactement la taille de l'écran du
  // téléphone/tablette (CW x CH = window.innerWidth x window.innerHeight), donc jamais de
  // bande vide (letterbox) ET jamais de zoom/recadrage forcé. GROUND_Y est calé proche du bas
  // de l'écran (peu de ciel visible) pour que le sol occupe le maximum d'espace en bas.
  let CW, CH, GROUND_Y, TILE_H;
  let playerInitialized = false;
  let imagesReady = false;

  function fitCanvas(){
    const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
    CW = window.innerWidth;
    CH = window.innerHeight;
    GROUND_Y = Math.round(CH * 0.90); // le sol occupe le maximum du bas de l'écran
    // TILE_H assez grand pour que même la tuile la moins favorable (GRASS_FRAC le plus haut)
    // descende bien jusqu'au bas de l'écran, quelle que soit la taille de l'écran.
    TILE_H = Math.ceil((CH - GROUND_Y) / (1 - 0.664) * 1.15);

    canvas.style.width = CW + 'px';
    canvas.style.height = CH + 'px';
    canvas.width = CW * dpr;
    canvas.height = CH * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    if(imagesReady) computeTileSizes();
    if(playerInitialized){
      player.y = GROUND_Y - player.h;
      cameraX = Math.min(cameraX, Math.max(0, levelWidth - CW));
    }
  }
  fitCanvas();
  window.addEventListener('resize', fitCanvas);
  window.addEventListener('orientationchange', fitCanvas);

  // ---- Charge des images depuis base64 ----
  function loadImg(src){ const i = new Image(); i.src = src; return i; }
  const bgImg = loadImg(BG_SRC);
  const groundImgs = [loadImg(GROUND_SRC_1), loadImg(GROUND_SRC_2), loadImg(GROUND_SRC_3), loadImg(GROUND_SRC_4)];
  const maloSheetImg = loadImg(MALO_SHEET_SRC);
  imagesReady = true;

  // ---- Animation de Malo image par image (sprite sheet), car un GIF dessiné dans un
  //      <canvas> ne s'anime PAS tout seul sur la plupart des navigateurs : on gère donc
  //      nous-mêmes l'avancement des frames avec les vraies durées du GIF d'origine. ----
  const MALO_FRAME_COUNT = 33;
  const MALO_COLS = 6;
  const MALO_FRAME_W = 220;
  const MALO_FRAME_H = 193;
  const MALO_DURATIONS = [70,60,70,70,60,70,70,60,70,70,60,70,70,60,70,70,60,70,70,60,70,70,60,70,70,60,70,70,60,70,70,60,70];
  let maloFrameIndex = 0;
  let maloFrameTimer = 0;
  function updateMaloFrame(dt){
    if(!dt || dt > 250) dt = 16; // évite les gros sauts (ex: retour d'onglet, lag)
    maloFrameTimer += dt;
    while(maloFrameTimer >= MALO_DURATIONS[maloFrameIndex]){
      maloFrameTimer -= MALO_DURATIONS[maloFrameIndex];
      maloFrameIndex = (maloFrameIndex + 1) % MALO_FRAME_COUNT;
    }
  }

  // ---- Construction du niveau : on enchaine les 5 tuiles de sol dans un ordre choisi, en boucle ----
  const NB_TILES = 24; // 4 iles variées en boucle, niveau nettement plus long
  const TILE_ORDER = Array.from({length: NB_TILES}, (_,i)=> i % 4);

  // Chaque image GROUND_xx est en fait un "morceau d'ile flottante" : l'herbe n'est visible
  // qu'entre environ 55% et 65% de la hauteur de l'image (le reste est transparent : les arbres
  // dépassent au-dessus, les racines/roches s'estompent en dessous). On mesure où se trouve la
  // ligne d'herbe (grassFrac) pour caler le sol "marchable" bien à plat, quelle que soit la tuile.
  const GRASS_FRAC = [0.664, 0.660, 0.620, 0.613]; // ligne d'herbe mesurée pour ground1, ground2, ground3, ground4

  let tileDrawWidth = 0; // calculé après chargement de la 1ere image
  let levelWidth = 0;
  let tilesReady = false;

  // ---- Objets du niveau : pierres à escalader, bonbons à récupérer, ballons,
  //      animaux (papillon/oiseau/coccinelle) et décors de forêt ----
  let stones = [], candies = [], balloons = [], animals = [], decor = [];
  let shapesCircle = [], shapesSquare = [], magicBalls = [];
  let candiesCollected = 0, circlesCollected = 0, squaresCollected = 0;
  const CANDIES_NEEDED = 10, CIRCLES_NEEDED = 3, SQUARES_NEEDED = 4;
  let objectsReady = false;

  function rand(min, max){ return min + Math.random() * (max - min); }

  function generateLevelObjects(){
    if(objectsReady || !tilesReady) return;
    objectsReady = true;

    const startX = 260;
    const endX = levelWidth - 260;

    // Pierres : seulement 5 amas de rochers escaladables, hauteur atteignable au saut de Malo
    const STONE_COUNT = 5;
    for(let i = 0; i < STONE_COUNT; i++){
      const x = startX + (endX - startX) * ((i + 0.5) / STONE_COUNT) + rand(-40, 40);
      const w = rand(150, 190);
      const h = 40;
      const y = GROUND_Y - rand(55, 95);
      // amas de 3 rochers irréguliers, forme figée une fois pour toutes (pas de scintillement)
      const rocks = [
        { dx: w*0.20, dy: rand(4,10),  rw: w*0.34, rh: h*1.1, shade: rand(-8,8) },
        { dx: w*0.52, dy: rand(-2,4),  rw: w*0.40, rh: h*1.25, shade: rand(-8,8) },
        { dx: w*0.82, dy: rand(6,12),  rw: w*0.30, rh: h*1.0, shade: rand(-8,8) }
      ];
      const moss = rand(0,1) < 0.7; // touffe de mousse/herbe sur le dessus, comme dans une prairie
      stones.push({x, y, w, h, rocks, moss});
    }

    // Bonbons : 12 posés (2 de plus que les 10 nécessaires), au sol et sur les pierres
    for(let i = 0; i < 12; i++){
      let x, y;
      if(stones.length && Math.random() < 0.55){
        const s = stones[Math.floor(Math.random() * stones.length)];
        x = s.x + rand(24, Math.max(24, s.w - 24));
        y = s.y - 30;
      } else {
        x = rand(startX, endX);
        y = GROUND_Y - rand(36, 66);
      }
      candies.push({x, y, r: 17, taken: false, bob: Math.random() * Math.PI * 2, hue: Math.floor(rand(0,360))});
    }

    // Ballons de baudruche posés au sol, seulement 2 pour ne pas répéter l'effet trop souvent
    for(let i = 0; i < 2; i++){
      const x = startX + (endX - startX) * ((i + 1) / 3) + rand(-50, 50);
      balloons.push({
        x, y: GROUND_Y - 74, w: 58, h: 74,
        state: 'ground', // ground | flying | popped
        hue: Math.floor(rand(0,360))
      });
    }

    // Cercles jaunes et carrés bleus : petits défis de collection avec compteur dédié
    for(let i = 0; i < 5; i++){
      const x = rand(startX, endX);
      const y = GROUND_Y - rand(30, 60);
      shapesCircle.push({x, y, r: 15, taken: false, bob: Math.random()*Math.PI*2});
    }
    for(let i = 0; i < 6; i++){
      const x = rand(startX, endX);
      const y = GROUND_Y - rand(30, 60);
      shapesSquare.push({x, y, s: 26, taken: false, bob: Math.random()*Math.PI*2});
    }

    // Boule magique : la traverser déclenche un effet magique sur Malo
    for(let i = 0; i < 2; i++){
      const x = startX + (endX - startX) * ((i + 1) / 3) + rand(-70, 70);
      const y = GROUND_Y - rand(120, 170);
      magicBalls.push({x, y, r: 24, used: false, bob: Math.random()*Math.PI*2});
    }

    // Animaux décoratifs : papillons, oiseaux, coccinelles qui volent gentiment
    const animalEmojis = ['🦋','🐦','🐞'];
    for(let i = 0; i < 16; i++){
      animals.push({
        type: animalEmojis[Math.floor(Math.random() * animalEmojis.length)],
        baseX: rand(0, levelWidth),
        baseY: rand(GROUND_Y * 0.22, GROUND_Y * 0.68),
        amp: rand(18, 46),
        speed: rand(0.015, 0.035),
        t: Math.random() * Math.PI * 2,
        size: rand(26, 36)
      });
    }

    // Décors de forêt : arbres/buissons dispersés (milieu de scène + quelques-uns au premier plan)
    const decorEmojis = ['🌲','🌳','🌿','🍄'];
    let i = 0;
    for(let x = 0; x < levelWidth; x += rand(140, 240)){
      decor.push({
        x,
        type: decorEmojis[Math.floor(Math.random() * decorEmojis.length)],
        size: rand(46, 76),
        foreground: (i % 4 === 0)
      });
      i++;
    }
  }

  function computeTileSizes(){
    if(!(groundImgs[0].complete && groundImgs[0].naturalWidth)) return;
    const ratio = groundImgs[0].naturalWidth / groundImgs[0].naturalHeight;
    tileDrawWidth = TILE_H * ratio;
    levelWidth = tileDrawWidth * TILE_ORDER.length;
    tilesReady = true;
    generateLevelObjects();
  }
  groundImgs[0].onload = computeTileSizes;
  computeTileSizes();

  // ---- Etat du jeu ----
  const GRAVITY = 0.85;
  const JUMP_FORCE = -16.5;
  const MOVE_SPEED = 3.1;
  const FRICTION = 0.82;

  const player = {
    x: 80, y: GROUND_Y - 100, w: 114, h: 100,
    vx: 0, vy: 0, onGround: false, facing: 1,
    animT: 0, squash: 1,
    isFlying: false, flyingBalloon: null, magicT: 0
  };
  playerInitialized = true;

  let cameraX = 0;
  let keys = { left:false, right:false, jump:false };
  let gameState = 'start'; // start | playing | win
  let finished = false;

  // ---- Contrôles clavier ----
  window.addEventListener('keydown', e=>{
    if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
    if(e.code === 'ArrowRight'|| e.code === 'KeyD') keys.right = true;
    if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.jump = true;
  });
  window.addEventListener('keyup', e=>{
    if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if(e.code === 'ArrowRight'|| e.code === 'KeyD') keys.right = false;
    if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.jump = false;
  });

  // ---- Contrôles tactiles ----
  function bindHold(el, onDown, onUp){
    el.addEventListener('touchstart', e=>{ e.preventDefault(); onDown(); }, {passive:false});
    el.addEventListener('touchend', e=>{ e.preventDefault(); onUp(); }, {passive:false});
    el.addEventListener('mousedown', e=>{ e.preventDefault(); onDown(); });
    el.addEventListener('mouseup', e=>{ e.preventDefault(); onUp(); });
    el.addEventListener('mouseleave', ()=> onUp());
  }
  bindHold(document.getElementById('leftBtn'),  ()=>keys.left=true,  ()=>keys.left=false);
  bindHold(document.getElementById('rightBtn'), ()=>keys.right=true, ()=>keys.right=false);
  bindHold(document.getElementById('jumpBtn'),  ()=>keys.jump=true,  ()=>keys.jump=false);

  // ---- Ecrans ----
  const MISSIONS = [
    {key:'candy',  need: CANDIES_NEEDED, label: '🍬 Trouve les ' + CANDIES_NEEDED + ' bonbons !'},
    {key:'circle', need: CIRCLES_NEEDED, label: '🟡 Trouve ' + CIRCLES_NEEDED + ' cercles jaunes !'},
    {key:'square', need: SQUARES_NEEDED, label: '🟦 Trouve ' + SQUARES_NEEDED + ' carrés bleus !'},
    {key:'magic',  need: 1, label: '✨ Trouve la boule magique !'}
  ];
  let missionIndex = 0;
  function updateMissionBanner(){
    const el = document.getElementById('missionBanner');
    if(missionIndex >= MISSIONS.length){ el.textContent = '🎉 Bravo, tout est trouvé !'; return; }
    el.textContent = MISSIONS[missionIndex].label;
  }
  function updateCounterHUD(){
    document.getElementById('candyCounter').textContent =
      '🍬 ' + candiesCollected + '/' + CANDIES_NEEDED + ' \u00a0 🟡 ' + circlesCollected + '/' + CIRCLES_NEEDED + ' \u00a0 🟦 ' + squaresCollected + '/' + SQUARES_NEEDED;
  }
  function checkMissionProgress(){
    if(missionIndex >= MISSIONS.length) return;
    const m = MISSIONS[missionIndex];
    const done = (m.key==='candy' && candiesCollected>=m.need) ||
                 (m.key==='circle' && circlesCollected>=m.need) ||
                 (m.key==='square' && squaresCollected>=m.need) ||
                 (m.key==='magic' && player.magicT > 0);
    if(done){ missionIndex++; updateMissionBanner(); }
  }
  updateMissionBanner();

  document.getElementById('startBtn').addEventListener('click', ()=>{
    document.getElementById('startScreen').style.display = 'none';
    gameState = 'playing';
  });
  document.getElementById('replayBtn').addEventListener('click', ()=>{
    document.getElementById('winScreen').style.display = 'none';
    player.x = 80; player.y = GROUND_Y - 100; player.vx=0; player.vy=0;
    player.isFlying = false; player.flyingBalloon = null;
    cameraX = 0; finished = false;
    candiesCollected = 0; circlesCollected = 0; squaresCollected = 0;
    updateCounterHUD();
    for(const c of candies) c.taken = false;
    for(const c of shapesCircle) c.taken = false;
    for(const c of shapesSquare) c.taken = false;
    for(const m of magicBalls) m.used = false;
    player.magicT = 0;
    missionIndex = 0;
    updateMissionBanner();
    for(const b of balloons) b.state = 'ground';
    for(const s of stones){ /* les pierres ne changent pas */ }
    gameState = 'playing';
  });

  // ---- Crever un ballon : un petit tap/clic du doigt dessus suffit ----
  function popBalloonAt(px, py){
    for(const b of balloons){
      if(b.state !== 'flying') continue;
      const sx = b.x - cameraX;
      const sy = b.y;
      if(px > sx - 14 && px < sx + b.w + 14 && py > sy - 14 && py < sy + b.h + 14){
        b.state = 'popped';
        if(player.flyingBalloon === b){
          player.isFlying = false;
          player.flyingBalloon = null;
          player.vy = 0; // il retombe tout doux ensuite grâce à la gravité normale
        }
      }
    }
  }
  canvas.addEventListener('pointerdown', (ev)=>{
    if(gameState !== 'playing') return;
    const rect = canvas.getBoundingClientRect();
    popBalloonAt(ev.clientX - rect.left, ev.clientY - rect.top);
  }, {passive:true});

  // ---- Boucle de jeu ----
  function update(){
    if(gameState !== 'playing' || !tilesReady) return;

    if(player.isFlying && player.flyingBalloon && player.flyingBalloon.state === 'flying'){
      // ---- Accroché au ballon : il monte et avance tout seul dans le ciel ----
      const b = player.flyingBalloon;
      b.y -= 2.1;
      b.x += 1.15;
      if(b.y < CH * 0.06) b.y = CH * 0.06; // ne sort pas de l'écran par le haut
      player.x = b.x + b.w/2 - player.w/2;
      player.y = b.y + b.h * 0.6;
      player.vx = 0; player.vy = 0;
      player.onGround = false;
    } else {
      if(keys.left){ player.vx -= MOVE_SPEED*0.35; player.facing = -1; }
      if(keys.right){ player.vx += MOVE_SPEED*0.35; player.facing = 1; }
      player.vx *= FRICTION;
      if(Math.abs(player.vx) > MOVE_SPEED) player.vx = MOVE_SPEED*Math.sign(player.vx);

      if(keys.jump && player.onGround){
        player.vy = JUMP_FORCE;
        player.onGround = false;
      }

      player.vy += GRAVITY;
      player.x += player.vx;
      player.y += player.vy;
    }

    player.onGround = false;

    // pierres : on peut monter dessus uniquement en retombant depuis le dessus
    if(!player.isFlying){
      for(const s of stones){
        const withinX = player.x + player.w > s.x + 6 && player.x < s.x + s.w - 6;
        const feet = player.y + player.h;
        if(withinX && player.vy >= 0 && feet >= s.y && feet <= s.y + Math.max(player.vy + 4, 16)){
          player.y = s.y - player.h;
          player.vy = 0;
          player.onGround = true;
        }
      }
    }

    // sol
    if(player.y + player.h >= GROUND_Y){
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.onGround = true;
    }

    // ballons posés : Malo qui les touche s'envole avec, dans le ciel
    if(!player.isFlying){
      for(const b of balloons){
        if(b.state !== 'ground') continue;
        const touch = player.x < b.x + b.w && player.x + player.w > b.x &&
                      player.y < b.y + b.h && player.y + player.h > b.y;
        if(touch){
          b.state = 'flying';
          player.isFlying = true;
          player.flyingBalloon = b;
        }
      }
    }

    // bonbons : ramassés au contact
    for(const c of candies){
      if(c.taken) continue;
      const cx = player.x + player.w/2, cy = player.y + player.h/2;
      if(Math.abs(cx - c.x) < player.w/2 + c.r && Math.abs(cy - c.y) < player.h/2 + c.r){
        c.taken = true;
        candiesCollected++;
        updateCounterHUD();
      }
    }

    // cercles jaunes et carrés bleus : ramassés au contact
    for(const c of shapesCircle){
      if(c.taken) continue;
      const cx = player.x + player.w/2, cy = player.y + player.h/2;
      if(Math.abs(cx - c.x) < player.w/2 + c.r && Math.abs(cy - c.y) < player.h/2 + c.r){
        c.taken = true; circlesCollected++; updateCounterHUD();
      }
    }
    for(const c of shapesSquare){
      if(c.taken) continue;
      const cx = player.x + player.w/2, cy = player.y + player.h/2;
      if(Math.abs(cx - c.x) < player.w/2 + c.s/2 && Math.abs(cy - c.y) < player.h/2 + c.s/2){
        c.taken = true; squaresCollected++; updateCounterHUD();
      }
    }

    // boule magique : la traverser déclenche un effet magique (halo scintillant) sur Malo
    for(const m of magicBalls){
      if(m.used) continue;
      const cx = player.x + player.w/2, cy = player.y + player.h/2;
      if(Math.abs(cx - m.x) < player.w/2 + m.r && Math.abs(cy - m.y) < player.h/2 + m.r){
        m.used = true;
        player.magicT = 240; // ~4 secondes d'effet magique à 60fps
      }
    }
    if(player.magicT > 0) player.magicT--;

    checkMissionProgress();

    // limites gauche
    if(player.x < 0) player.x = 0;
    // limite droite = fin du niveau
    const maxX = levelWidth - 120;
    if(player.x > maxX){ player.x = maxX; }

    // animation marche (léger squash/stretch)
    if(Math.abs(player.vx) > 0.3 && player.onGround){
      player.animT += 0.25;
      player.squash = 1 + Math.sin(player.animT)*0.06;
    } else {
      player.animT = 0;
      player.squash = player.onGround ? 1 : 1.08;
    }

    // camera : suit le joueur, centré, sans dépasser les bords du niveau
    let targetCam = player.x - CW*0.4;
    if(targetCam < 0) targetCam = 0;
    if(targetCam > levelWidth - CW) targetCam = Math.max(0, levelWidth - CW);
    cameraX += (targetCam - cameraX) * 0.12;

    // progression
    const progress = Math.min(100, Math.round((player.x / maxX)*100));
    document.getElementById('progressBar').style.width = progress + '%';

    if(player.x >= maxX - 4 && candiesCollected >= CANDIES_NEEDED && !finished){
      finished = true;
      gameState = 'win';
      document.getElementById('winScreen').style.display = 'flex';
    }

    // animaux : petit vol tranquille (papillon/oiseau/coccinelle)
    for(const a of animals) a.t += a.speed;
  }

  function drawBackground(){
    // parallaxe lente : le fond défile à 20% de la vitesse de la camera, répété en boucle
    if(!bgImg.complete || !bgImg.naturalWidth) return;
    const bgRatio = bgImg.naturalWidth / bgImg.naturalHeight;
    const bgH = CH;
    const bgW = bgH * bgRatio;
    const parallaxX = -((cameraX * 0.2) % bgW);
    let x = parallaxX - bgW;
    while(x < CW){
      ctx.drawImage(bgImg, x, 0, bgW, bgH);
      x += bgW;
    }
  }

  function drawGround(){
    if(!tilesReady) return;

    // 1) Filet de sécurité assorti à la couleur réelle du sol (visible seulement sur 1-2px de seam,
    //    jamais en grand aplat) : on ne voit JAMAIS le fond (ciel/montagnes) sous les pieds de Malo.
    const earthGrad = ctx.createLinearGradient(0, GROUND_Y, 0, CH);
    earthGrad.addColorStop(0, '#7d6a3a');
    earthGrad.addColorStop(1, '#4a3d22');
    ctx.fillStyle = earthGrad;
    ctx.fillRect(0, GROUND_Y, CW, CH - GROUND_Y);

    // 2) On dessine chaque tuile par-dessus, calée pour que sa ligne d'herbe tombe pile sur GROUND_Y.
    //    TILE_H est choisi assez grand pour que l'image elle-même descende jusqu'au bas de l'écran
    //    (le filet de sécurité ci-dessus ne sert alors qu'à masquer un éventuel pixel d'arrondi).
    let worldX = 0;
    for(let i=0;i<TILE_ORDER.length;i++){
      const idx = TILE_ORDER[i];
      const img = groundImgs[idx];
      const screenX = worldX - cameraX;
      if(screenX + tileDrawWidth > 0 && screenX < CW){
        if(img.complete && img.naturalWidth){
          const destY = GROUND_Y - GRASS_FRAC[idx] * TILE_H;
          ctx.drawImage(img, screenX - 1, destY, tileDrawWidth + 2, TILE_H);
        }
      }
      worldX += tileDrawWidth;
    }
  }

  function drawStones(){
    for(const s of stones){
      const sx = s.x - cameraX;
      if(sx + s.w < 0 || sx > CW) continue;

      // ombre portée au sol pour ancrer visuellement le rocher
      ctx.fillStyle = 'rgba(0,0,0,.18)';
      ctx.beginPath();
      ctx.ellipse(sx + s.w/2, s.y + s.h + 6, s.w*0.46, 8, 0, 0, Math.PI*2);
      ctx.fill();

      for(const r of s.rocks){
        const rx = sx + r.dx;
        const ry = s.y + s.h - r.rh*0.5 + r.dy;
        const base = 128 + r.shade;
        const g = ctx.createRadialGradient(rx - r.rw*0.3, ry - r.rh*0.35, r.rw*0.1, rx, ry, r.rw*1.1);
        g.addColorStop(0, `rgb(${base+40},${base+30},${base+14})`);
        g.addColorStop(0.6, `rgb(${base-6},${base-16},${base-24})`);
        g.addColorStop(1, `rgb(${base-46},${base-46},${base-40})`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(rx, ry, r.rw*0.5, r.rh*0.5, 0, 0, Math.PI*2);
        ctx.fill();
        // petites craquelures/texture
        ctx.strokeStyle = `rgba(60,50,40,.25)`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(rx - r.rw*0.18, ry - r.rh*0.1);
        ctx.lineTo(rx + r.rw*0.08, ry + r.rh*0.18);
        ctx.stroke();
      }

      if(s.moss){
        // touffe de mousse/herbe sur le dessus, comme dans la prairie
        ctx.fillStyle = '#5f8f3a';
        for(let k = 0; k < 5; k++){
          const mx = sx + s.w*0.15 + k*(s.w*0.17);
          const my = s.y + s.h*0.32 - Math.abs(Math.sin(k))*3;
          ctx.beginPath();
          ctx.ellipse(mx, my, 10, 6, 0, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }
  }

  function drawCandies(){
    for(const c of candies){
      if(c.taken) continue;
      const sx = c.x - cameraX;
      if(sx < -30 || sx > CW + 30) continue;
      const bobY = c.y + Math.sin(performance.now()*0.004 + c.bob) * 5;
      const r = c.r;
      const hue = c.hue;
      const body = `hsl(${hue},85%,60%)`;
      const bodyDark = `hsl(${hue},75%,42%)`;
      const wrap = `hsl(${(hue+40)%360},90%,72%)`;

      ctx.save();
      ctx.translate(sx, bobY);

      // papillotes (twists) de chaque côté, comme un vrai bonbon emballé
      ctx.fillStyle = wrap;
      ctx.beginPath();
      ctx.moveTo(-r*1.15, 0);
      ctx.lineTo(-r*1.9, -r*0.55);
      ctx.lineTo(-r*1.9, r*0.55);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(r*1.15, 0);
      ctx.lineTo(r*1.9, -r*0.55);
      ctx.lineTo(r*1.9, r*0.55);
      ctx.closePath(); ctx.fill();

      // corps rond et coloré du bonbon
      const g = ctx.createRadialGradient(-r*0.35, -r*0.35, r*0.15, 0, 0, r*1.1);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(0.25, body);
      g.addColorStop(1, bodyDark);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(0, 0, r, r, 0, 0, Math.PI*2);
      ctx.fill();

      // petit reflet brillant
      ctx.fillStyle = 'rgba(255,255,255,.75)';
      ctx.beginPath();
      ctx.ellipse(-r*0.35, -r*0.4, r*0.32, r*0.18, -0.5, 0, Math.PI*2);
      ctx.fill();

      ctx.restore();
    }
  }

  function drawShapes(){
    // cercles jaunes
    for(const c of shapesCircle){
      if(c.taken) continue;
      const sx = c.x - cameraX;
      if(sx < -30 || sx > CW + 30) continue;
      const bobY = c.y + Math.sin(performance.now()*0.004 + c.bob) * 5;
      const g = ctx.createRadialGradient(sx-c.r*0.3, bobY-c.r*0.3, c.r*0.1, sx, bobY, c.r*1.1);
      g.addColorStop(0, '#fff8d0');
      g.addColorStop(0.35, '#ffd83d');
      g.addColorStop(1, '#e8a800');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(sx, bobY, c.r, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(180,120,0,.5)'; ctx.lineWidth = 2; ctx.stroke();
    }
    // carrés bleus
    for(const c of shapesSquare){
      if(c.taken) continue;
      const sx = c.x - cameraX;
      if(sx < -30 || sx > CW + 30) continue;
      const bobY = c.y + Math.sin(performance.now()*0.004 + c.bob) * 5;
      ctx.save();
      ctx.translate(sx, bobY);
      ctx.rotate(Math.sin(performance.now()*0.002 + c.bob) * 0.15);
      const g = ctx.createLinearGradient(-c.s/2, -c.s/2, c.s/2, c.s/2);
      g.addColorStop(0, '#bfe6ff');
      g.addColorStop(0.5, '#3d8bff');
      g.addColorStop(1, '#1a5fd0');
      ctx.fillStyle = g;
      const r2 = 6;
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(-c.s/2, -c.s/2, c.s, c.s, r2) : ctx.rect(-c.s/2, -c.s/2, c.s, c.s);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawMagicBalls(){
    for(const m of magicBalls){
      if(m.used) continue;
      const sx = m.x - cameraX;
      if(sx < -50 || sx > CW + 50) continue;
      const t = performance.now()*0.003 + m.bob;
      const bobY = m.y + Math.sin(t) * 6;
      const g = ctx.createRadialGradient(sx-m.r*0.3, bobY-m.r*0.3, m.r*0.15, sx, bobY, m.r*1.2);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(0.35, `hsl(${(t*60)%360},90%,70%)`);
      g.addColorStop(1, `hsl(${(t*60+120)%360},85%,55%)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(sx, bobY, m.r, 0, Math.PI*2);
      ctx.fill();
      // petites étincelles autour
      for(let k=0;k<4;k++){
        const a = t*2 + k*(Math.PI/2);
        ctx.fillStyle = 'rgba(255,255,255,.85)';
        ctx.beginPath();
        ctx.arc(sx + Math.cos(a)*m.r*1.5, bobY + Math.sin(a)*m.r*1.5, 3, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  function drawBalloons(){
    for(const b of balloons){
      if(b.state === 'popped') continue;
      const sx = b.x - cameraX;
      if(sx + b.w < -40 || sx > CW + 40) continue;
      // ficelle
      ctx.strokeStyle = 'rgba(80,60,40,.7)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx + b.w/2, b.y + b.h);
      ctx.lineTo(sx + b.w/2, b.y + b.h + 30);
      ctx.stroke();
      ctx.font = b.w + "px 'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('🎈', sx + b.w/2, b.y);
    }
  }

  function drawAnimals(){
    for(const a of animals){
      const worldX = a.baseX + Math.sin(a.t) * a.amp * 3;
      const worldY = a.baseY + Math.sin(a.t * 1.7) * a.amp;
      const sx = worldX - cameraX;
      if(sx < -40 || sx > CW + 40) continue;
      ctx.font = a.size + "px 'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(a.type, sx, worldY);
    }
  }

  function drawDecor(foreground){
    const speed = foreground ? 1.15 : 1;
    for(const d of decor){
      if(!!d.foreground !== !!foreground) continue;
      const sx = d.x - cameraX * speed;
      if(sx < -100 || sx > CW + 100) continue;
      ctx.font = d.size + "px 'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.globalAlpha = foreground ? 0.95 : 1;
      ctx.fillText(d.type, sx, GROUND_Y + d.size * 0.28);
      ctx.globalAlpha = 1;
    }
  }

  function drawPlayer(){
    const sx = player.x - cameraX;
    const sy = player.y;
    ctx.save();
    ctx.translate(sx + player.w/2, sy + player.h);
    ctx.scale(player.facing, 1);
    // ombre
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(0, 4, player.w*0.5, 7, 0, 0, Math.PI*2);
    ctx.fill();

    // Malo (sprite sheet animée image par image, cf. updateMaloFrame)
    if(maloSheetImg.complete && maloSheetImg.naturalWidth){
      const col = maloFrameIndex % MALO_COLS;
      const row = Math.floor(maloFrameIndex / MALO_COLS);
      ctx.drawImage(
        maloSheetImg,
        col*MALO_FRAME_W, row*MALO_FRAME_H, MALO_FRAME_W, MALO_FRAME_H,
        -player.w/2, -player.h, player.w, player.h
      );
    }

    // effet magique : halo scintillant et arc-en-ciel après la boule magique
    if(player.magicT > 0){
      const t = performance.now()*0.006;
      const alpha = Math.min(1, player.magicT / 40);
      ctx.globalAlpha = alpha;
      const g = ctx.createRadialGradient(0, -player.h/2, 4, 0, -player.h/2, player.w*0.9);
      g.addColorStop(0, `hsla(${(t*120)%360},95%,75%,.55)`);
      g.addColorStop(1, 'hsla(0,0%,100%,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, -player.h/2, player.w*0.9, 0, Math.PI*2);
      ctx.fill();
      for(let k=0;k<5;k++){
        const a = t*2 + k*(Math.PI*2/5);
        const rr = player.w*0.55;
        ctx.fillStyle = `hsl(${(t*120 + k*70)%360},95%,70%)`;
        ctx.beginPath();
        ctx.arc(Math.cos(a)*rr, -player.h/2 + Math.sin(a)*rr, 4, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,CW,CH);
    // ciel de secours si l'image de fond n'est pas encore prête
    const grad = ctx.createLinearGradient(0,0,0,CH);
    grad.addColorStop(0,'#8fd3ff');
    grad.addColorStop(1,'#d8f5ff');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,CW,CH);

    drawBackground();
    drawDecor(false);
    drawGround();
    drawStones();
    drawCandies();
    drawShapes();
    drawMagicBalls();
    drawBalloons();
    drawAnimals();
    drawPlayer();
    drawDecor(true);
  }

  let lastTs = 0;
  function loop(ts){
    const dt = lastTs ? (ts - lastTs) : 16;
    lastTs = ts;
    updateMaloFrame(dt);
    update();
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
