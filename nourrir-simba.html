<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Nourrir Simba</title>

<link rel="stylesheet" href="../style.css">

<style>

body{

margin:0;

background:#ffe082;

overflow:hidden;

font-family:Arial;

text-align:center;

}

h1{

margin-top:20px;

color:#ff9800;

}

#jeu{

position:relative;

width:100%;

height:80vh;

}

#simba{

position:absolute;

bottom:40px;

left:50%;

transform:translateX(-50%);

width:220px;

}

.aliment{

position:absolute;

width:90px;

cursor:grab;

}

#score{

font-size:35px;

font-weight:bold;

margin-top:15px;

}

</style>

</head>

<body>

<h1>🦁 Nourrir Simba</h1>

<div id="score">

Score : <span id="points">0</span>

</div>

<div id="jeu">

<img id="simba" src="../assets/simba.png">

<img class="aliment" src="../assets/viande.png" style="top:80px;left:80px;">

<img class="aliment" src="../assets/viande.png" style="top:80px;left:220px;">

<img class="aliment" src="../assets/viande.png" style="top:80px;left:360px;">

<img class="aliment" src="../assets/viande.png" style="top:80px;left:500px;">

</div>

<script src="nourrir-simba.js"></script>

</body>

</html>
