<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Construction - Le Monde de Malo</title>
<style>
  html,body{ margin:0; padding:0; overflow:hidden; background:#2b1c10; touch-action:manipulation; overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;-moz-user-select:none;-ms-user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }
  *{-webkit-tap-highlight-color:transparent;}
  ::selection{background:transparent;}
  #gameWrap{
    position:relative; width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; background:#3a2a18;
  }
  canvas{ display:block; touch-action:none; }
  #backHome{
    position:absolute; top:14px; left:14px; z-index:40;
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.65); border:3px solid rgba(255,255,255,.9);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:900; color:#3a4a5a; text-decoration:none;
    box-shadow:0 4px 10px rgba(0,0,0,.25);
  }
  #backHome:active{ background:rgba(255,255,255,.9); transform:scale(.94); }

  #soundToggle{
    position:absolute; top:14px; right:14px; z-index:40;
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.65); border:3px solid rgba(255,255,255,.9);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; box-shadow:0 4px 10px rgba(0,0,0,.25); cursor:pointer;
  }
  #soundToggle:active{ background:rgba(255,255,255,.9); transform:scale(.94); }

  #pieceCounter{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.85); border-radius:20px; padding:8px 20px;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
    font-size:clamp(14px,3.6vw,19px); font-weight:800; color:#5a3a1c;
    box-shadow:0 4px 10px rgba(0,0,0,.2); z-index:30; white-space:nowrap;
  }

  #stopBtn{
    position:absolute; top:64px; right:14px; z-index:40;
    background:linear-gradient(180deg,#7be06a,#3fae2c);
    color:#fff; border:3px solid #fff; border-radius:24px;
    padding:10px 18px; font-size:clamp(13px,3.2vw,17px); font-weight:900;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
    box-shadow:0 5px 12px rgba(0,0,0,.3);
    display:none;
  }
  #stopBtn:active{ transform:scale(.95); }

  #tray{
    position:absolute; bottom:0; left:0; width:100%;
    display:flex; gap:10px; padding:12px 10px calc(30px + env(safe-area-inset-bottom));
    overflow-x:auto; -webkit-overflow-scrolling:touch; touch-action:pan-x;
    background:linear-gradient(0deg, rgba(30,18,8,.85), rgba(30,18,8,0));
    z-index:35;
  }
  .pieceBtn{
    flex:0 0 auto; width:64px; height:64px; border-radius:14px;
    background:rgba(255,255,255,.9); border:3px solid #fff;
    box-shadow:0 4px 8px rgba(0,0,0,.3);
    display:flex; align-items:center; justify-content:center;
  }
  .pieceBtn.selected{ border-color:#ffd83d; box-shadow:0 0 0 4px rgba(255,216,61,.6), 0 4px 8px rgba(0,0,0,.3); }
  .pieceBtn:active{ transform:scale(.92); }
  .pieceBtn canvas{ width:100%; height:100%; }

  #replayBtn2{
    position:absolute; bottom:6vh; left:50%; transform:translateX(-50%);
    background:linear-gradient(180deg,#ffce4a,#ff9d1f);
    color:#fff; border:4px solid #fff; border-radius:30px;
    padding:14px 30px; font-size:clamp(16px,4vw,22px); font-weight:900;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
    box-shadow:0 6px 14px rgba(0,0,0,.35);
    display:none; z-index:45;
  }
  #replayBtn2:active{ transform:translateX(-50%) scale(.95); }

  #revealMsg{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.9); border-radius:20px; padding:10px 22px;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
    font-size:clamp(15px,4vw,20px); font-weight:900; color:#5a3a1c;
    box-shadow:0 4px 10px rgba(0,0,0,.25); z-index:30; display:none; text-align:center;
  }
</style>
</head>
<body>
<div id="gameWrap">
  <a id="backHome" href="index.html">←</a>
  <button id="soundToggle">🔊</button>
  <div id="pieceCounter">🧱 0 pièces</div>
  <button id="stopBtn">✅ Voir le résultat</button>
  <div id="revealMsg">🏰 Bravo Malo ! Regarde ta tour magique !<br>👉 Touche la tour pour la faire s'écrouler</div>
  <canvas id="game"></canvas>
  <div id="tray"></div>
  <button id="replayBtn2">🔁 Reconstruire</button>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let CW=0, CH=0;

  function fitCanvas(){
    const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
    CW = window.innerWidth; CH = window.innerHeight;
    canvas.style.width = CW+'px'; canvas.style.height = CH+'px';
    canvas.width = CW*dpr; canvas.height = CH*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  fitCanvas();
  window.addEventListener('resize', fitCanvas);
  window.addEventListener('orientationchange', fitCanvas);

  // ---- Musique de fond (même fichier que la cuisine) ----
  let muted = false;
  const bgMusic = new Audio('sounds/musique_fond.mp3');
  bgMusic.loop = true;
  bgMusic.volume = 0.25;
  let bgStarted = false;
  function startBgMusic(){
    if(bgStarted) return;
    bgStarted = true;
    if(!muted) bgMusic.play().catch(()=>{});
  }
  window.addEventListener('pointerdown', startBgMusic, {once:true});
  document.getElementById('soundToggle').addEventListener('click', ()=>{
    muted = !muted;
    document.getElementById('soundToggle').textContent = muted ? '🔇' : '🔊';
    if(muted){ bgMusic.pause(); } else if(bgStarted){ bgMusic.play().catch(()=>{}); }
  });

  // ---- Fond de la chambre (défile vers le haut quand la tour grandit) ----
  const bgImg = new Image();
  bgImg.src = 'images/construction_bg.jpg';
  let bgReady = false;
  bgImg.onload = ()=>{ bgReady = true; };

  function maxCameraY(){
    if(!bgReady) return Infinity;
    const scale = bgScaleFactor();
    const drawH = bgImg.height * scale;
    return Math.max(0, drawH - CH);
  }

  // ---- Formes de pièces dessinées (plus d'images externes -> plus de bug "tout pareil") ----
  const SHAPES = ['cube','rect','cyl','arch','cone'];
  const SHAPE_ASPECT = { cube:1, rect:1.9, cyl:0.72, arch:1.35, cone:0.9 };
  const COLOR_DEFS = [
    { name:'wood',   top:'#e2b579', side:'#b8814a' },
    { name:'red',    top:'#ff7a72', side:'#e2453f' },
    { name:'blue',   top:'#6badf5', side:'#3f76c9' },
    { name:'yellow', top:'#ffe066', side:'#eeab1f' },
    { name:'green',  top:'#8fe06a', side:'#4fae2c' }
  ];
  const PIECE_DISPLAY_H = 60;

  const PIECE_TYPES = [];
  SHAPES.forEach(shape=>{
    COLOR_DEFS.forEach(colors=>{
      PIECE_TYPES.push({
        shape, colors,
        w: PIECE_DISPLAY_H * SHAPE_ASPECT[shape],
        h: PIECE_DISPLAY_H
      });
    });
  });

  function roundRectPath(g,x,y,w,h,r){
    g.beginPath();
    g.moveTo(x+r,y);
    g.arcTo(x+w,y,x+w,y+h,r);
    g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r);
    g.arcTo(x,y,x+w,y,r);
    g.closePath();
  }

  function drawGrain(g,x,y,w,h){
    g.strokeStyle='rgba(110,65,20,.28)';
    g.lineWidth=1.4;
    for(let i=1;i<3;i++){
      g.beginPath();
      g.moveTo(x+4, y+h*(i/3));
      g.quadraticCurveTo(x+w/2, y+h*(i/3)+4, x+w-4, y+h*(i/3));
      g.stroke();
    }
  }

  // ---- Dessin d'une pièce = une vraie forme (cube / planche / cylindre / arche / cône) ----
  function drawPiece(g, p, cx, topY, wOverride, hOverride){
    const w = wOverride || p.w, h = hOverride || p.h;
    const shape = p.shape, colors = p.colors;
    const left = cx - w/2, right = cx + w/2, bottom = topY + h;
    g.save();
    switch(shape){
      case 'cube':
      case 'rect': {
        const r = Math.min(10, w*0.14, h*0.14);
        roundRectPath(g, left, topY, w, h, r);
        const grad = g.createLinearGradient(0, topY, 0, bottom);
        grad.addColorStop(0, colors.top);
        grad.addColorStop(1, colors.side);
        g.fillStyle = grad; g.fill();
        g.lineWidth = 2; g.strokeStyle = 'rgba(0,0,0,.25)'; g.stroke();
        g.fillStyle = 'rgba(255,255,255,.35)';
        roundRectPath(g, left+4, topY+3, w-8, h*0.26, r*0.6); g.fill();
        if(colors.name==='wood') drawGrain(g,left,topY,w,h);
        break;
      }
      case 'cyl': {
        const rx = w/2;
        roundRectPath(g, left, topY+h*0.16, w, h*0.84, rx*0.5);
        const grad = g.createLinearGradient(left,0,right,0);
        grad.addColorStop(0, colors.side); grad.addColorStop(0.5, colors.top); grad.addColorStop(1, colors.side);
        g.fillStyle = grad; g.fill();
        g.lineWidth=2; g.strokeStyle='rgba(0,0,0,.25)'; g.stroke();
        g.beginPath();
        g.ellipse(cx, topY+h*0.16, rx, h*0.14, 0, 0, Math.PI*2);
        g.fillStyle = colors.top; g.fill(); g.stroke();
        if(colors.name==='wood') drawGrain(g,left,topY+h*0.16,w,h*0.7);
        break;
      }
      case 'arch': {
        roundRectPath(g, left, topY, w, h, 8);
        const grad = g.createLinearGradient(0, topY, 0, bottom);
        grad.addColorStop(0, colors.top); grad.addColorStop(1, colors.side);
        g.fillStyle = grad; g.fill();
        g.save();
        roundRectPath(g, left, topY, w, h, 8);
        g.clip();
        g.globalCompositeOperation = 'destination-out';
        g.beginPath();
        g.arc(cx, bottom, w*0.34, Math.PI, 0);
        g.lineTo(right*0 + cx + w*0.34, bottom);
        g.lineTo(cx - w*0.34, bottom);
        g.closePath();
        g.fill();
        g.restore();
        g.lineWidth=2; g.strokeStyle='rgba(0,0,0,.25)';
        roundRectPath(g,left,topY,w,h,8); g.stroke();
        if(colors.name==='wood') drawGrain(g,left,topY,w,h*0.5);
        break;
      }
      case 'cone': {
        g.beginPath();
        g.moveTo(cx, topY);
        g.lineTo(right, bottom);
        g.lineTo(left, bottom);
        g.closePath();
        const grad = g.createLinearGradient(left,0,right,0);
        grad.addColorStop(0, colors.side); grad.addColorStop(0.5, colors.top); grad.addColorStop(1, colors.side);
        g.fillStyle = grad; g.fill();
        g.lineWidth=2; g.strokeStyle='rgba(0,0,0,.25)'; g.stroke();
        break;
      }
    }
    g.restore();
  }

  // ---- Tray (palette) ----
  const tray = document.getElementById('tray');
  let selectedIdx = 0;
  const trayBtns = [];
  PIECE_TYPES.forEach((p, idx)=>{
    const btn = document.createElement('div');
    btn.className = 'pieceBtn' + (idx===0 ? ' selected' : '');
    const c = document.createElement('canvas');
    c.width = 64; c.height = 64;
    const g = c.getContext('2d');
    const scale = Math.min(50/p.w, 50/p.h);
    g.clearRect(0,0,64,64);
    drawPiece(g, p, 32, 32 - (p.h*scale)/2, p.w*scale, p.h*scale);
    btn.appendChild(c);
    tray.appendChild(btn);
    trayBtns.push(btn);
  });

  // ---- Etat de la tour ----
  let stack = [];
  let placedCount = 0;
  let cameraY = 0, targetCameraY = 0;
  let swaying = false, swayStart = 0;
  let mode = 'building';
  let fallingPieces = [];
  let dropAnim = null;

  const BASE_Y = ()=> CH * 0.86;
  const STACK_X = ()=> CW/2;

  function addPiece(typeIdx, xOffset){
    if(mode !== 'building') return;
    const p = PIECE_TYPES[typeIdx];
    const prevTop = stack.length ? stack[stack.length-1].topY : BASE_Y();
    const h = p.h;
    const maxOffset = 70;
    const jitter = xOffset !== undefined ? Math.max(-maxOffset, Math.min(maxOffset, xOffset)) : (Math.random()-0.5) * 10;
    const piece = { p, x: jitter, topY: prevTop - h, h };
    dropAnim = { piece, fromY: -60, t: 0 };
    stack.push(piece);
    placedCount++;
    document.getElementById('pieceCounter').textContent = '🧱 ' + placedCount + ' pièces';

    if(placedCount >= 3){
      document.getElementById('stopBtn').style.display = 'block';
    }
    if(placedCount % 5 === 0){
      swaying = true; swayStart = performance.now();
    }
    const topWorldY = stack[stack.length-1].topY;
    targetCameraY = Math.min(maxCameraY(), Math.max(0, (BASE_Y() - topWorldY) - CH*0.55));
  }

  // ---- Ancien mode: sélectionner puis glisser directement sur la scène (toujours dispo) ----
  let placeDrag = null;

  canvas.addEventListener('pointerdown', (ev)=>{
    if(mode !== 'building') return;
    const rect = canvas.getBoundingClientRect();
    placeDrag = { x: ev.clientX - rect.left };
  }, {passive:true});

  canvas.addEventListener('pointermove', (ev)=>{
    if(!placeDrag || mode !== 'building') return;
    const rect = canvas.getBoundingClientRect();
    placeDrag.x = ev.clientX - rect.left;
  }, {passive:true});

  function finishPlaceDrag(){
    if(!placeDrag || mode !== 'building'){ placeDrag = null; return; }
    const xOffset = placeDrag.x - STACK_X();
    addPiece(selectedIdx, xOffset);
    placeDrag = null;
  }
  canvas.addEventListener('pointerup', finishPlaceDrag, {passive:true});
  canvas.addEventListener('pointercancel', ()=>{ placeDrag = null; }, {passive:true});

  // ---- Nouveau: vrai glisser depuis la pioche (comme le puzzle) ----
  let dragState = null;

  function pieceGhostSize(p){
    const maxDim = 74;
    const scale = Math.min(maxDim/p.w, maxDim/p.h);
    return { w: p.w*scale, h: p.h*scale };
  }

  trayBtns.forEach((btn, idx)=>{
    btn.addEventListener('pointerdown', (ev)=>{
      ev.preventDefault();
      selectedIdx = idx;
      trayBtns.forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      if(mode !== 'building') return;

      const p = PIECE_TYPES[idx];
      const size = pieceGhostSize(p);
      const ghost = document.createElement('canvas');
      const dpr = Math.max(1, Math.min(window.devicePixelRatio||1, 3));
      ghost.width = size.w*dpr; ghost.height = size.h*dpr;
      ghost.style.cssText = 'position:fixed;left:'+(ev.clientX-size.w/2)+'px;top:'+(ev.clientY-size.h/2)+'px;'+
        'width:'+size.w+'px;height:'+size.h+'px;pointer-events:none;z-index:200;opacity:.92;'+
        'filter:drop-shadow(0 4px 6px rgba(0,0,0,.4));';
      const gg = ghost.getContext('2d');
      gg.scale(dpr,dpr);
      drawPiece(gg, p, size.w/2, 0, size.w, size.h);
      document.body.appendChild(ghost);
      dragState = { idx, ghost, size, pointerId: ev.pointerId, moved:false };
    }, {passive:false});
  });

  window.addEventListener('pointermove', (ev)=>{
    if(!dragState || ev.pointerId !== dragState.pointerId) return;
    dragState.moved = true;
    dragState.ghost.style.left = (ev.clientX - dragState.size.w/2) + 'px';
    dragState.ghost.style.top = (ev.clientY - dragState.size.h/2) + 'px';
  }, {passive:true});

  function endDrag(ev){
    if(!dragState || ev.pointerId !== dragState.pointerId) return;
    const rect = canvas.getBoundingClientRect();
    const trayTop = tray.getBoundingClientRect().top;
    const overCanvas = ev.clientX >= rect.left && ev.clientX <= rect.right &&
                        ev.clientY >= rect.top && ev.clientY <= trayTop;
    if(dragState.moved && overCanvas && mode === 'building'){
      const xOffset = (ev.clientX - rect.left) - STACK_X();
      addPiece(dragState.idx, xOffset);
    }
    dragState.ghost.remove();
    dragState = null;
  }
  window.addEventListener('pointerup', endDrag, {passive:true});
  window.addEventListener('pointercancel', ()=>{
    if(dragState){ dragState.ghost.remove(); dragState = null; }
  }, {passive:true});

  // ---- Bouton stop / voir le résultat ----
  document.getElementById('stopBtn').addEventListener('click', ()=>{
    if(mode !== 'building') return;
    mode = 'reveal';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('pieceCounter').style.display = 'none';
    tray.style.display = 'none';
    const topWorldY = stack.length ? stack[stack.length-1].topY : BASE_Y();
    const towerHeight = BASE_Y() - topWorldY + 80;
    targetCameraY = Math.min(maxCameraY(), Math.max(0, towerHeight - CH*0.9));
    setTimeout(()=>{
      document.getElementById('revealMsg').style.display = 'block';
    }, 900);
  });

  canvas.addEventListener('pointerdown', (ev)=>{
    if(mode !== 'reveal') return;
    const rect = canvas.getBoundingClientRect();
    const px = ev.clientX - rect.left;
    if(Math.abs(px - CW/2) < 140){
      collapseTower();
    }
  }, {passive:true});

  function collapseTower(){
    mode = 'collapsing';
    document.getElementById('revealMsg').style.display = 'none';
    fallingPieces = stack.map(s => ({
      p: s.p, x: STACK_X() + s.x, y: cameraOffsetToScreenY(s.topY),
      vx: (Math.random()-0.5) * 9, vy: -6 - Math.random()*4,
      rot: 0, vrot: (Math.random()-0.5) * 0.35
    }));
    stack = [];
    placedCount = 0;
    setTimeout(()=>{
      mode = 'done';
      document.getElementById('replayBtn2').style.display = 'block';
    }, 1800);
  }

  document.getElementById('replayBtn2').addEventListener('click', ()=>{
    mode = 'building';
    stack = []; placedCount = 0; fallingPieces = [];
    cameraY = 0; targetCameraY = 0;
    document.getElementById('pieceCounter').textContent = '🧱 0 pièces';
    document.getElementById('pieceCounter').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('replayBtn2').style.display = 'none';
    tray.style.display = 'flex';
  });

  function cameraOffsetToScreenY(worldTopY){
    return worldTopY + cameraY;
  }

  // ---- Boucle ----
  let lastTs = 0;
  function loop(ts){
    const dt = lastTs ? (ts-lastTs) : 16;
    lastTs = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function update(dt){
    cameraY += (targetCameraY - cameraY) * 0.08;
    cameraY = Math.min(cameraY, maxCameraY());
    if(swaying && performance.now() - swayStart > 2200) swaying = false;
    if(dropAnim){
      dropAnim.t += dt/220;
      if(dropAnim.t >= 1){ dropAnim = null; }
    }
    if(mode === 'collapsing'){
      for(const f of fallingPieces){
        f.vy += 0.9;
        f.x += f.vx; f.y += f.vy; f.rot += f.vrot;
      }
    }
  }

  function bgScaleFactor(){
    // Moins zoomé qu'avant : juste assez de hauteur en plus pour permettre un léger
    // défilement quand la tour grandit, sans recadrer la pièce de façon trop serrée.
    const scaleByWidth = CW / bgImg.width;
    const scaleByMinHeight = (CH * 1.35) / bgImg.height;
    return Math.max(scaleByWidth, scaleByMinHeight);
  }

  function drawBackground(){
    if(!bgReady){ ctx.fillStyle = '#3a2a18'; ctx.fillRect(0,0,CW,CH); return; }
    const scale = bgScaleFactor();
    const drawW = bgImg.width * scale;
    const drawH = bgImg.height * scale;
    const x = (CW - drawW) / 2;
    const y = (CH - drawH) + cameraY;
    ctx.drawImage(bgImg, x, y, drawW, drawH);
  }

  function drawStack(){
    const sway = swaying ? Math.sin((performance.now()-swayStart)/260) * 0.055 * Math.min(1,(performance.now()-swayStart)/400) : 0;
    ctx.save();
    ctx.translate(STACK_X(), BASE_Y() + cameraY);
    ctx.rotate(sway);
    for(const s of stack){
      const localTopY = s.topY - BASE_Y();
      let drawY = localTopY;
      const drawX = s.x;
      if(dropAnim && dropAnim.piece === s){
        const e = 1 - Math.pow(1-dropAnim.t, 3);
        drawY = dropAnim.fromY + (localTopY - dropAnim.fromY) * e;
      }
      drawPiece(ctx, s.p, drawX, drawY, undefined, undefined);
    }
    ctx.restore();
  }

  function drawFalling(){
    for(const f of fallingPieces){
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.rot);
      drawPiece(ctx, f.p, 0, -f.p.h/2, undefined, undefined);
      ctx.restore();
    }
  }

  function drawGhost(){
    if(!placeDrag) return;
    const p = PIECE_TYPES[selectedIdx];
    const topWorldY = stack.length ? stack[stack.length-1].topY : BASE_Y();
    const topScreenY = topWorldY + cameraY;
    const ghostScreenY = topScreenY - p.h - 26;
    ctx.save();
    ctx.globalAlpha = 0.6;
    drawPiece(ctx, p, placeDrag.x, ghostScreenY, undefined, undefined);
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,.8)';
    ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.moveTo(placeDrag.x, ghostScreenY + p.h);
    ctx.lineTo(placeDrag.x, topScreenY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function draw(){
    ctx.clearRect(0,0,CW,CH);
    drawBackground();
    if(mode === 'building' || mode === 'reveal'){
      drawStack();
      drawGhost();
    } else if(mode === 'collapsing' || mode === 'done'){
      drawFalling();
    }
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
