<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Les copains de Malo">
<meta name="theme-color" content="#2b1c10">
<title>Les copains de Malo</title>
<link rel="icon" href="images/icon.png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ACCUEIL -->
  <div class="screen active" id="home" style="background-image:url('images/home_bg.jpg'); background-size:cover; background-position:center;">
    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="bird" style="top:14%;">〰</div>
    <div class="bird b2" style="top:30%;">〰</div>
    <div class="butterfly" style="top:52%; left:12%; animation-delay:.3s;">🦋</div>
    <div class="butterfly" style="top:60%; right:14%; animation-delay:1.6s;">🦋</div>

    <h1 class="title">Les copains de Malo</h1>
    <div class="subtitle">Touche pour jouer avec eux !</div>
    <div class="roster"></div>

    <div class="grass-row">
      <div class="blade"></div><div class="blade"></div><div class="blade"></div>
      <div class="blade"></div><div class="blade"></div><div class="blade"></div>
      <div class="blade"></div><div class="blade"></div><div class="blade"></div>
      <div class="blade"></div><div class="blade"></div><div class="blade"></div>
    </div>
    <div class="flower" style="left:10%;">🌼</div>
    <div class="flower" style="left:30%; animation-delay:.6s;">🌸</div>
    <div class="flower" style="right:22%; animation-delay:1.1s;">🌼</div>
    <div class="flower" style="right:6%; animation-delay:1.7s;">🌸</div>

    <div class="home-btn-row">
      <button class="room-btn kitchen" onclick="startKitchen()">
        <span class="room-emoji">🍽️</span>
        <span class="room-text">
          <span class="room-label">Cuisine</span>
          <span class="room-sub">On va jouer !</span>
        </span>
      </button>
      <button class="room-btn bath" onclick="startBath()">
        <span class="room-emoji">🛁</span>
        <span class="room-text">
          <span class="room-label">Bain</span>
          <span class="room-sub">Au bain !</span>

    // ...
        </span>
      </button>
      <button class="room-btn puzzle" onclick="startPuzzle()">
        <span class="room-emoji">🧩</span>
        <span class="room-text">
          <span class="room-label">Puzzle</span>
          <span class="room-sub">24 pièces !</span>
        </span>
      </button>
      <button class="room-btn aventure" onclick="startAventure()">
        <span class="room-emoji">🗺️</span>
        <span class="room-text">
          <span class="room-label">Aventure</span>
          <span class="room-sub">La prairie !</span>
        </span>
      </button>
      <button class="room-btn construction" onclick="startConstruction()">
        <span class="room-emoji">🧱</span>
        <span class="room-text">
          <span class="room-label">Construction</span>
          <span class="room-sub">Bâtis la tour !</span>
        </span>
      </button>
      <button class="room-btn lego" onclick="startLego()">
        <span class="room-emoji">🟦</span>
        <span class="room-text">
          <span class="room-label">Lego</span>
          <span class="room-sub">Construis large !</span>
        </span>
      </button>
    </div>
  </div>

  <!-- JEU CUISINE -->
  <div class="screen" id="kitchenScreen">
<div id="wrap">
  <div class="topbar">
    <button class="pill back-pill" onclick="stopKitchen()">←</button>
    <button class="pill" onclick="resetScene()">🧹 Ranger</button>
    <div class="pill score-pill">🍽️ <span id="kScore">0</span>/4</div>
    <button class="pill" id="soundToggle" onclick="toggleMute()">🔊</button>
