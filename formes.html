<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Les formes - Le Monde de Malo</title>
<style>
  html,body{ margin:0; padding:0; overflow:hidden; touch-action:manipulation; overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;-moz-user-select:none;-ms-user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
  }
  *{-webkit-tap-highlight-color:transparent; box-sizing:border-box;}
  ::selection{background:transparent;}
  #wrap{
    position:relative; width:100vw; height:100vh; overflow:hidden;
    background:url('images/menu_room_bg.png') center top/cover no-repeat, linear-gradient(180deg,#bfe9ff 0%,#eaf6ff 45%,#fff3d6 100%);
    display:flex; flex-direction:column;
  }

  .topbar{position:relative; z-index:40; display:flex; justify-content:space-between; align-items:flex-start; padding:14px;}
  .round-btn{
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.75); border:3px solid rgba(255,255,255,.95);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:900; color:#3a4a5a; text-decoration:none;
    box-shadow:0 4px 10px rgba(0,0,0,.2); cursor:pointer;
  }
  .round-btn:active{ transform:scale(.94); }
  .score-pill{
    background:rgba(255,255,255,.85); border-radius:20px; padding:8px 18px;
    font-size:clamp(14px,3.6vw,18px); font-weight:800; color:#5a3a1c;
    box-shadow:0 4px 10px rgba(0,0,0,.2); white-space:nowrap;
  }

  /* ---- menu des modes ---- */
  #modePicker{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    gap:0; padding:0 5vw calc(30px + env(safe-area-inset-bottom));
    position:relative;
  }
  #modePicker::before{
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(255,247,222,.15) 0%, rgba(255,247,222,0) 30%, rgba(120,80,30,.12) 100%);
    pointer-events:none;
  }
  #modePicker h1{
    position:relative; z-index:1;
    color:#a5672f; font-size:clamp(20px,6.4vw,27px); margin:0 0 26px 0;
    text-align:center; background:rgba(255,253,247,.88);
    padding:10px 28px; border-radius:30px; border:3px solid #fff;
    box-shadow:0 8px 16px rgba(90,60,20,.25);
  }
  .menu-panel{
    position:relative; z-index:1; width:100%; max-width:230px;
    padding:0;
  }
  #modeGrid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; width:100%; }
  .mode-card{
    --accent:#ffd166; --accent-dark:#d99a1f;
    background:#fff2dd;
    border:3px solid var(--accent);
    border-radius:26px;
    display:block;
    padding:0; box-shadow:0 0 0 3px rgba(255,255,255,.5) inset, 0 8px 18px rgba(60,40,10,.28), 0 0 14px var(--accent);
    cursor:pointer; aspect-ratio:1/0.92; position:relative; overflow:hidden;
  }
  .mode-card:active{ transform:translateY(3px); }
  .mode-card .mode-img{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;
  }
  .mode-card .mode-pill{
    position:absolute; left:50%; bottom:10px; z-index:1; transform:translateX(-50%);
    background:var(--accent-dark); color:#fff; font-weight:800; font-size:15.5px;
    letter-spacing:.2px; padding:8px 22px; border-radius:30px; white-space:nowrap;
    box-shadow:0 4px 8px rgba(0,0,0,.35); border:2px solid rgba(255,255,255,.85);
  }
  .mode-card.soon{ cursor:default; }
  .mode-card.soon .mode-img{ filter:grayscale(.25) brightness(.85); }
  .mode-card.soon:active{ transform:none; }
  .mode-card .mode-tag{
    position:absolute; top:8px; right:8px; z-index:1;
    font-size:10px; font-weight:800; color:#fff; background:#a5672f;
    padding:3px 9px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,.25);
  }

  /* ---- mode plein écran (pizza / robot / sous-marin) : une seule image plein écran ---- */
  #pizzaMode, #robotMode, #sousmarinMode{ display:none; flex:1; flex-direction:column; align-items:center; justify-content:space-between; padding:0; overflow:hidden; }
  .row-label{ position:relative; z-index:2; font-weight:800; color:#5a3a1c; font-size:clamp(13px,3.8vw,17px); text-align:center; text-shadow:0 1px 2px rgba(255,255,255,.6); background:rgba(255,255,255,.75); padding:4px 0; }

  #pizzaStage, #robotStage, #sousmarinStage{ position:relative; width:100%; flex:1; overflow:hidden; }
  #pizzaImg, #robotImg, #sousmarinImg{ position:fixed; inset:0; width:100vw; height:100vh; object-fit:cover; object-position:center 38%; z-index:0; }
  #robotImg{ object-position:center center; }
  #sousmarinImg{ object-fit:contain; object-position:center center; }
  #pizzaBoard, #robotBoard, #sousmarinBoard{ position:fixed; z-index:1; }

  #piecesRow, #piecesRowRobot, #piecesRowSousmarin{ position:relative; z-index:2; display:flex; justify-content:center; gap:2.2vw; width:100%; padding:6px 4vw calc(28px + env(safe-area-inset-bottom)); flex-wrap:wrap; }
  #piecesRowSousmarin{ gap:6vw; padding-bottom:calc(56px + env(safe-area-inset-bottom)); background:rgba(255,255,255,.4); }

  .shape-base{ width:15vw; height:15vw; max-width:64px; max-height:64px; }

  .piece{
    cursor:grab; touch-action:none;
    transition:opacity .2s;
    background:#fff;
    border-radius:50%;
    border:3px solid #fff;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
    padding:1%;
  }
  .piece.placed{ opacity:0; pointer-events:none; }
  #piecesRowSousmarin .piece{ background:none; border:none; box-shadow:none; padding:0; filter:drop-shadow(0 3px 5px rgba(0,0,0,.4)); }

  .sousmarin-slot{
    position:absolute; width:20%; height:15%; transform:translate(-50%,-50%);
    border-radius:16px; cursor:pointer;
  }
  .sousmarin-slot.correct{ box-shadow:0 0 0 4px #7be06a inset; background:rgba(123,224,106,.25); }
  .sousmarin-slot.wrong{ animation: slotShake .4s ease-in-out; }
  @keyframes slotShake{
    0%,100%{ transform:translate(-50%,-50%); }
    25%{ transform:translate(calc(-50% - 8px),-50%); }
    75%{ transform:translate(calc(-50% + 8px),-50%); }
  }

  .hole{
    position:absolute;
    z-index:5;
    display:flex; align-items:center; justify-content:center;
  }
  .hole.hover .hole-piece{ filter:drop-shadow(0 3px 4px rgba(0,0,0,.35)) brightness(1.3); }
  .hole .hole-piece{ width:100%; height:100%; opacity:.55; transform:scale(.92); transition:transform .35s cubic-bezier(.3,1.6,.4,1), opacity .3s, filter .2s; }
  .hole.filled .hole-piece{ opacity:1; transform:scale(1); }

  /* sous-marin : trou = silhouette NOIRE pleine de la pièce, sans fond gris derrière */
  #sousmarinBoard .hole:not(.filled) .hole-piece{
    opacity:1;
    filter:brightness(0);
  }
  #sousmarinBoard .hole.hover:not(.filled) .hole-piece{
    filter:brightness(0.25);
  }
  #sousmarinBoard .hole.filled .hole-piece{ filter:none; }

  /* contour blanc qui suit la silhouette exacte de la forme, uniquement pour le robot */
  #robotBoard .hole .hole-piece{
    opacity:.6;
    filter:
      drop-shadow(1.5px 0 0 #fff) drop-shadow(-1.5px 0 0 #fff)
      drop-shadow(0 1.5px 0 #fff) drop-shadow(0 -1.5px 0 #fff)
      drop-shadow(1px 1px 0 #fff) drop-shadow(-1px -1px 0 #fff)
      drop-shadow(1px -1px 0 #fff) drop-shadow(-1px 1px 0 #fff);
  }
  #robotBoard .hole.hover .hole-piece{ filter: brightness(1.3) drop-shadow(0 0 4px #fff); }
  #robotBoard .hole.filled .hole-piece{ opacity:1; filter:drop-shadow(0 3px 4px rgba(0,0,0,.3)); }

  .ghost-piece{ position:fixed; z-index:200; pointer-events:none; opacity:.92; }

  .toast{
    position:absolute; left:50%; top:64px; transform:translateX(-50%);
    background:#fff; padding:9px 20px; border-radius:20px; font-weight:800; color:#a5672f;
    box-shadow:0 4px 10px rgba(0,0,0,.2); opacity:0; transition:opacity .3s; pointer-events:none;
    z-index:60; font-size:clamp(13px,3.6vw,16px); white-space:nowrap;
  }
  .toast.show{ opacity:1; }

  .confetti-piece{position:fixed; pointer-events:none; border-radius:2px; z-index:70;}

  #endBanner, #endBannerRobot, #endBannerSousmarin{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(255,255,255,.95); opacity:0; pointer-events:none; transition:opacity .3s; text-align:center; z-index:80;
  }
  #endBanner.show, #endBannerRobot.show, #endBannerSousmarin.show{ opacity:1; pointer-events:auto; }
  #endBanner .big, #endBannerRobot .big, #endBannerSousmarin .big{ font-size:54px; margin-bottom:8px; }
  #endBanner h2, #endBannerRobot h2, #endBannerSousmarin h2{ color:#e0507f; font-size:28px; margin:0 0 8px 0; }
  #endBanner p, #endBannerRobot p, #endBannerSousmarin p{ color:#5a7a67; font-weight:600; margin:0 0 22px 0; }
  .again-btn{
    background:linear-gradient(180deg,#ffe08a,#ffd166); border:none; border-bottom:5px solid #d99a1f;
    border-radius:40px; padding:14px 40px; font-family:inherit; font-weight:800; font-size:18px;
    color:#7a4a26; cursor:pointer;
  }
  .again-btn:active{ transform:translateY(3px); border-bottom-width:1px; }

  /* ---- personnage robot animé (calque séparé du fond) ---- */
  .robot-char{
    position:absolute;
    z-index:2;
    transform-origin:bottom center;
    filter: drop-shadow(0 10px 16px rgba(0,0,0,.35)) drop-shadow(0 0 14px rgba(120,200,255,.45));
    animation: robotFloat 3.2s ease-in-out infinite, robotGlow 2.4s ease-in-out infinite;
  }
  @keyframes robotFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-14px); }
  }
  @keyframes robotGlow{
    0%,100%{ filter: drop-shadow(0 10px 16px rgba(0,0,0,.35)) drop-shadow(0 0 12px rgba(120,200,255,.4)); }
    50%{ filter: drop-shadow(0 10px 16px rgba(0,0,0,.35)) drop-shadow(0 0 30px rgba(140,215,255,.85)); }
  }
  .robot-char.celebrate{
    animation: robotJump .8s cubic-bezier(.3,1.6,.4,1), robotFlash .8s ease;
  }
  @keyframes robotJump{
    0%{ transform:translateY(0) scale(1,1); }
    22%{ transform:translateY(8px) scale(1.1,0.9); }
    55%{ transform:translateY(-75px) scale(0.95,1.07); }
    78%{ transform:translateY(0px) scale(1.06,0.94); }
    100%{ transform:translateY(0) scale(1,1); }
  }
  @keyframes robotFlash{
    0%,100%{ filter: drop-shadow(0 10px 16px rgba(0,0,0,.35)) drop-shadow(0 0 12px rgba(120,200,255,.4)) brightness(1); }
    40%{ filter: drop-shadow(0 10px 16px rgba(0,0,0,.35)) drop-shadow(0 0 50px rgba(255,255,255,.95)) brightness(1.4); }
  }
  .sparkle{
    position:fixed; pointer-events:none; z-index:6; color:#fff;
    text-shadow:0 0 8px rgba(255,255,255,.95), 0 0 14px rgba(140,210,255,.8);
    animation: sparklePop 1.1s ease-out forwards;
  }
  @keyframes sparklePop{
    0%{ opacity:0; transform:scale(.2) rotate(0deg); }
    30%{ opacity:1; transform:scale(1) rotate(25deg); }
    100%{ opacity:0; transform:scale(.35) rotate(55deg); }
  }
</style>
</head>
<body>
<div id="wrap">
  <div class="topbar">
    <a class="round-btn" id="backBtn" href="index.html">←</a>
    <div class="score-pill" id="scorePill" style="display:none;"><span id="scoreEmoji">🍕</span> <span id="scoreCount">0</span></div>
    <button class="round-btn" id="soundToggle">🔊</button>
  </div>

  <div class="toast" id="toast"></div>

  <!-- MENU DES MODES -->
  <div id="modePicker">
    <div class="menu-panel">
      <div id="modeGrid">
        <div class="mode-card" id="cardPizza" style="--accent:#ff7a59; --accent-dark:#e0432f;">
          <img class="mode-img" src="images/menu_pizza.png" alt="Pizza">
          <div class="mode-pill">Pizza</div>
        </div>
        <div class="mode-card" id="cardRobot" style="--accent:#b073ff; --accent-dark:#7a3fd9;">
          <img class="mode-img" src="images/menu_robot.png" alt="Robot">
          <div class="mode-pill">Robot</div>
        </div>
        <div class="mode-card soon" style="--accent:#ffb84d; --accent-dark:#d9861f;">
          <img class="mode-img" src="images/menu_tableau.png" alt="Tableau">
          <div class="mode-pill">Tableau</div>
          <div class="mode-tag">Bientôt</div>
        </div>
        <div class="mode-card" id="cardSousmarin" style="--accent:#4dd0ff; --accent-dark:#1f9fd9;">
          <img class="mode-img" src="images/menu_sousmarin.png" alt="Sous-marin">
          <div class="mode-pill">Sous-marin</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODE PIZZA -->
  <div id="pizzaMode">
    <div class="row-label">👇 Trouve la bonne place pour chaque ingrédient !</div>
    <div id="pizzaStage">
      <img id="pizzaImg" src="images/pizza_board.jpeg" alt="pizzeria de Malo">
      <div id="pizzaBoard"></div>
    </div>
    <div id="piecesRow"></div>
  </div>

  <!-- MODE ROBOT -->
  <div id="robotMode">
    <div class="row-label">👇 Quelle forme le robot tient-il dans sa main ?</div>
    <div id="robotStage">
      <img id="robotImg" src="images/robot_bg.png" alt="décor spatial">
      <div id="robotBoard"></div>
    </div>
    <div id="piecesRowRobot"></div>
  </div>

  <!-- MODE SOUS-MARIN -->
  <div id="sousmarinMode">
    <div id="sousmarinStage">
      <img id="sousmarinImg" src="images/sousmarin_board.jpg" alt="sous-marin">
      <div id="sousmarinBoard"></div>
    </div>
    <div id="piecesRowSousmarin"></div>
  </div>

  <div id="endBanner">
    <div class="big">🎉🍕🎉</div>
    <h2>Bravo Malo !</h2>
    <p>Ta pizza est prête !</p>
    <button class="again-btn" id="againBtn">🔁 Rejouer</button>
  </div>

  <div id="endBannerRobot">
    <div class="big">🎉🤖🎉</div>
    <h2>Bravo Malo !</h2>
    <p>Tu as aidé le robot !</p>
    <button class="again-btn" id="againBtnRobot">🔁 Rejouer</button>
  </div>

  <div id="endBannerSousmarin">
    <div class="big">🎉🐠🎉</div>
    <h2>Bravo Malo !</h2>
    <p>Le sous-marin est réparé !</p>
    <button class="again-btn" id="againBtnSousmarin">🔁 Rejouer</button>
  </div>
</div>

<script>
/* ================= Son ================= */
let muted = false;
const SFX = {
  chime: new Audio('sounds/chime.wav'),
  miss:  new Audio('sounds/miss.wav'),
  win:   new Audio('sounds/win.wav'),
  robotPlace: new Audio('sounds/robot_place.mp3'),
  robotWin:   new Audio('sounds/robot_win.mp3'),
};
function playSfx(name){
  if(muted) return;
  const src = SFX[name]; if(!src) return;
  try{ const a = src.cloneNode(); a.volume = 0.65; a.play().catch(()=>{}); }catch(e){}
}

const robotMusic = new Audio('sounds/robot_music.mp3');
robotMusic.loop = true;
robotMusic.volume = 0.22;
function startRobotMusic(){ if(!muted) robotMusic.play().catch(()=>{}); }
function stopRobotMusic(){ robotMusic.pause(); robotMusic.currentTime = 0; }

const sousmarinMusic = new Audio('sounds/sousmarin_music.mp3');
sousmarinMusic.loop = true;
sousmarinMusic.volume = 0.22;
function startSousmarinMusic(){ if(!muted) sousmarinMusic.play().catch(()=>{}); }
function stopSousmarinMusic(){ sousmarinMusic.pause(); sousmarinMusic.currentTime = 0; }

document.getElementById('soundToggle').addEventListener('click', ()=>{
  muted = !muted;
  document.getElementById('soundToggle').textContent = muted ? '🔇' : '🔊';
  if(muted){ robotMusic.pause(); sousmarinMusic.pause(); } else {
    if(!robotMusic.paused || document.getElementById('robotMode').style.display==='flex'){ robotMusic.play().catch(()=>{}); }
    if(!sousmarinMusic.paused || document.getElementById('sousmarinMode').style.display==='flex'){ sousmarinMusic.play().catch(()=>{}); }
  }
});

function toast(msg, duration){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=> t.classList.remove('show'), duration || 1300);
}

function burstConfetti(x, y){
  const colors = ['#ff6f9c','#ffd166','#8fd694','#6fc3ff','#c98fff'];
  for(let i=0;i<16;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const size = 6 + Math.random()*6;
    p.style.width = size+'px'; p.style.height = size+'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.left = x+'px'; p.style.top = y+'px';
    document.body.appendChild(p);
    const dx = (Math.random()-0.5)*260;
    const dy = -(100+Math.random()*180);
    p.style.transition = 'transform .9s cubic-bezier(.2,.8,.3,1), opacity .9s';
    requestAnimationFrame(()=>{
      p.style.transform = `translate(${dx}px, ${dy}px) rotate(${Math.random()*360}deg)`;
      p.style.opacity = '0';
    });
    setTimeout(()=> p.remove(), 950);
  }
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ================= Générique : fit d'un board sur une image object-fit:cover ================= */
function makeFitter(imgEl, boardEl, objectPositionY, containMode){
  return function fit(){
    const cw = window.innerWidth, ch = window.innerHeight;
    const iw = imgEl.naturalWidth || 1024, ih = imgEl.naturalHeight || 1536;
    if(!cw || !ch) return;
    const scale = containMode ? Math.min(cw/iw, ch/ih) : Math.max(cw/iw, ch/ih);
    const dw = iw*scale, dh = ih*scale;
    const dx = (cw-dw)/2;
    const dy = (ch-dh) * objectPositionY;
    boardEl.style.left = dx+'px';
    boardEl.style.top = dy+'px';
    boardEl.style.width = dw+'px';
    boardEl.style.height = dh+'px';
  };
}

/* ================= Pizza : positionnement ================= */
const pizzaImg = document.getElementById('pizzaImg');
const pizzaBoard = document.getElementById('pizzaBoard');
const fitPizzaBoard = makeFitter(pizzaImg, pizzaBoard, 0.38);
if(pizzaImg.complete) fitPizzaBoard();
pizzaImg.addEventListener('load', fitPizzaBoard);
window.addEventListener('resize', fitPizzaBoard);

/* ================= Robot : positionnement ================= */
const robotImg = document.getElementById('robotImg');
const robotBoard = document.getElementById('robotBoard');
const fitRobotBoard = makeFitter(robotImg, robotBoard, 0.5);
if(robotImg.complete) fitRobotBoard();
robotImg.addEventListener('load', fitRobotBoard);
window.addEventListener('resize', fitRobotBoard);

/* ================= Sous-marin : positionnement ================= */
const sousmarinImg = document.getElementById('sousmarinImg');
const sousmarinBoard = document.getElementById('sousmarinBoard');
const fitSousmarinBoard = makeFitter(sousmarinImg, sousmarinBoard, 0.5, true);
if(sousmarinImg.complete) fitSousmarinBoard();
sousmarinImg.addEventListener('load', fitSousmarinBoard);
window.addEventListener('resize', fitSousmarinBoard);

/* ================= Menu ================= */
function showMode(modeEl, emoji, fitFn){
  document.getElementById('modePicker').style.display = 'none';
  modeEl.style.display = 'flex';
  document.getElementById('scorePill').style.display = 'flex';
  document.getElementById('scoreEmoji').textContent = emoji;
  document.getElementById('backBtn').onclick = (e)=>{
    e.preventDefault();
    stopSparkles();
    stopRobotMusic();
    stopSousmarinMusic();
    modeEl.style.display = 'none';
    document.getElementById('scorePill').style.display = 'none';
    document.getElementById('modePicker').style.display = 'flex';
  };
  fitFn();
}

document.getElementById('cardPizza').addEventListener('click', ()=>{
  showMode(document.getElementById('pizzaMode'), '🍕', fitPizzaBoard);
  startPizza();
});

document.getElementById('cardRobot').addEventListener('click', ()=>{
  showMode(document.getElementById('robotMode'), '🤖', fitRobotBoard);
  startRobot();
  startRobotMusic();
});

document.getElementById('cardSousmarin').addEventListener('click', ()=>{
  showMode(document.getElementById('sousmarinMode'), '🐠', fitSousmarinBoard);
  startSousmarin();
  startSousmarinMusic();
});

/* ================= Drag & drop générique (utilisé par pizza + robot) ================= */
let dragState = null;

function buildImgEl(imgSrc, extraClass){
  const el = document.createElement('img');
  el.src = imgSrc;
  el.draggable = false;
  el.className = 'shape-base' + (extraClass ? ' ' + extraClass : '');
  el.style.objectFit = 'contain';
  el.style.background = 'transparent';
  // Le filtre inline écrasait le CSS des trous (silhouette noire, contour robot...) :
  // on ne l'applique donc plus qu'aux pièces de la pioche / ghost, pas aux hole-piece.
  if(extraClass !== 'hole-piece'){
    el.style.filter = 'drop-shadow(0 3px 4px rgba(0,0,0,.35))';
  }
  return el;
}

function attachDrag(el, item, onDrop){
  el.addEventListener('pointerdown', (ev)=>{
    if(el.classList.contains('placed')) return;
    ev.preventDefault();
    const rect = el.getBoundingClientRect();
    const ghost = buildImgEl(item.img, 'ghost-piece');
    ghost.style.width = rect.width+'px';
    ghost.style.height = rect.height+'px';
    ghost.style.left = (ev.clientX - rect.width/2) + 'px';
    ghost.style.top = (ev.clientY - rect.height/2) + 'px';
    document.body.appendChild(ghost);
    dragState = { el, item, ghost, w:rect.width, h:rect.height, pointerId: ev.pointerId, onDrop };
  }, {passive:false});
}

window.addEventListener('pointermove', (ev)=>{
  if(!dragState || ev.pointerId !== dragState.pointerId) return;
  dragState.ghost.style.left = (ev.clientX - dragState.w/2) + 'px';
  dragState.ghost.style.top = (ev.clientY - dragState.h/2) + 'px';
  document.querySelectorAll('.hole:not(.filled)').forEach(h=>{
    const r = h.getBoundingClientRect();
    const over = ev.clientX>=r.left && ev.clientX<=r.right && ev.clientY>=r.top && ev.clientY<=r.bottom;
    h.classList.toggle('hover', over);
  });
}, {passive:true});

function endDrag(ev){
  if(!dragState || ev.pointerId !== dragState.pointerId) return;
  let landed = null;
  document.querySelectorAll('.hole:not(.filled)').forEach(h=>{
    h.classList.remove('hover');
    const r = h.getBoundingClientRect();
    const over = ev.clientX>=r.left && ev.clientX<=r.right && ev.clientY>=r.top && ev.clientY<=r.bottom;
    if(over) landed = h;
  });

  const { el, item, ghost, onDrop } = dragState;
  ghost.remove();
  dragState = null;

  if(landed){
    onDrop(landed, el, item);
  }
}
window.addEventListener('pointerup', endDrag, {passive:true});
window.addEventListener('pointercancel', ()=>{
  if(dragState){ dragState.ghost.remove(); dragState = null; }
}, {passive:true});

/* ================= Mode Robot : forme aléatoire sur le corps du robot ================= */
// Emplacements possibles sur le robot, en % du plateau (main déjà calée par toi ; les 4 autres sont des estimations à ajuster)
const ROBOT_SPOTS = [
  { id:'hand',        top: 54.0, left: 31.5 },  // main levée (déjà calée)
  { id:'elbow_left',  top: 58.0, left: 40.0 },  // coude du bras levé (estimation)
  { id:'elbow_right', top: 63.0, left: 66.0 },  // coude de l'autre bras (estimation)
  { id:'knee_left',   top: 79.0, left: 41.0 },  // genou gauche (estimation)
  { id:'knee_right',  top: 79.0, left: 58.0 },  // genou droit (estimation)
];

const SHAPES = [
  { id:'circle',   img:'images/circle.png',   label:'Rond' },
  { id:'square',   img:'images/square.png',   label:'Carré' },
  { id:'triangle', img:'images/triangle.png', label:'Triangle' },
  { id:'star',     img:'images/star.png',     label:'Étoile' },
  { id:'hexagon',  img:'images/hexagon.png',  label:'Hexagone' },
  { id:'diamond',  img:'images/diamond.png',  label:'Losange' },
];
let robotScore = 0;
let robotPlaced = 0;
let robotTotal = 0;
let robotSpots = [];
let robotLevel = 0;
const ROBOT_LEVELS = 5;

function startRobot(){
  robotScore = 0; robotLevel = 0;
  document.getElementById('scoreCount').textContent = 0;

  const board = document.getElementById('robotBoard');
  board.innerHTML = '';

  const charEl = document.createElement('img');
  charEl.id = 'robotChar';
  charEl.className = 'robot-char';
  charEl.src = 'images/robot.png';
  charEl.alt = 'robot';
  charEl.draggable = false;
  charEl.style.left = '26.07%';
  charEl.style.top = '43.62%';
  charEl.style.width = '47.95%';
  board.appendChild(charEl);

  startSparkles();
  setupRobotLevel();
}

function setupRobotLevel(){
  robotPlaced = 0;
  document.querySelectorAll('#robotBoard .hole').forEach(h=> h.remove());

  const board = document.getElementById('robotBoard');

  // 3 emplacements tirés au hasard parmi les 5, et 3 formes tirées au hasard parmi les 6
  robotSpots = shuffle(ROBOT_SPOTS).slice(0, 3);
  const targets = shuffle(SHAPES).slice(0, 3);
  robotTotal = targets.length;

  targets.forEach((shape, i)=>{
    const spot = robotSpots[i];
    const hole = document.createElement('div');
    hole.className = 'shape-base hole';
    hole.style.width = '15%'; hole.style.height = '10%';
    hole.style.top = spot.top+'%'; hole.style.left = spot.left+'%';
    hole.style.transform = 'translate(-50%,-50%)';
    hole.dataset.id = shape.id;
    const inner = buildImgEl(shape.img, 'hole-piece');
    hole.appendChild(inner);
    board.appendChild(hole);
  });

  const piecesRow = document.getElementById('piecesRowRobot');
  piecesRow.innerHTML = '';
  shuffle(targets).forEach(s=>{
    const piece = buildImgEl(s.img, 'piece');
    piece.dataset.id = s.id;
    attachDrag(piece, s, onRobotDrop);
    piecesRow.appendChild(piece);
  });
}

/* ---- étincelles autour du robot (idle) ---- */
let sparkleTimer = null;
function startSparkles(){
  stopSparkles();
  sparkleTimer = setInterval(()=>{
    const charEl = document.getElementById('robotChar');
    if(!charEl) return;
    const rect = charEl.getBoundingClientRect();
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = '✦';
    s.style.left = (rect.left + rect.width*(0.15+Math.random()*0.7)) + 'px';
    s.style.top = (rect.top + rect.height*(0.1+Math.random()*0.65)) + 'px';
    s.style.fontSize = (12 + Math.random()*14) + 'px';
    document.body.appendChild(s);
    setTimeout(()=> s.remove(), 1100);
  }, 450);
}
function stopSparkles(){
  if(sparkleTimer){ clearInterval(sparkleTimer); sparkleTimer = null; }
}

function onRobotDrop(hole, pieceEl, item){
  if(hole.dataset.id === item.id){
    hole.classList.add('filled');
    pieceEl.classList.add('placed');
    robotScore++;
    robotPlaced++;
    document.getElementById('scoreCount').textContent = robotScore;
    playSfx('robotPlace');
    toast('🎉 Bien joué !');
    const r = hole.getBoundingClientRect();
    burstConfetti(r.left + r.width/2, r.top + r.height/2);

    const charEl = document.getElementById('robotChar');
    if(charEl){
      charEl.classList.remove('celebrate');
      void charEl.offsetWidth; // relance l'animation même si déjà jouée
      charEl.classList.add('celebrate');
      setTimeout(()=> charEl.classList.remove('celebrate'), 800);
    }

    if(robotPlaced >= robotTotal){
      if(robotLevel + 1 >= ROBOT_LEVELS){
        setTimeout(()=>{
          playSfx('robotWin');
          stopRobotMusic();
          document.getElementById('endBannerRobot').classList.add('show');
        }, 500);
      } else {
        robotLevel++;
        toast('✨ Niveau ' + (robotLevel+1) + ' / ' + ROBOT_LEVELS + ' !');
        setTimeout(setupRobotLevel, 1000);
      }
    }
  } else {
    playSfx('miss');
    toast('Essaie encore ! 🤔');
  }
}

document.getElementById('againBtnRobot').addEventListener('click', ()=>{
  document.getElementById('endBannerRobot').classList.remove('show');
  startRobot();
  startRobotMusic();
});

/* ================= Mode Sous-marin (un seul sous-marin, 4 trous qui apparaissent un par un) ================= */
const SOUSMARIN_ROUNDS = [
  { piece:'images/sousmarin/piece1.png' },
  { piece:'images/sousmarin/piece2.png' },
  { piece:'images/sousmarin/piece3.png' },
  { piece:'images/sousmarin/piece4.png' },
];
// Emplacement UNIQUE et FIXE du trou sur la coque (là où tu as mis la flèche).
// Les 4 pièces passent toutes par ce même trou, une après l'autre.
const SOUSMARIN_HOLE_SPOT = { top:44.0, left:71.3, w:16.0, h:15.0 };
let sousmarinLevel = 0;
let sousmarinHoleEl = null;

function startSousmarin(){
  sousmarinLevel = 0;
  sousmarinBoard.innerHTML = '';
  sousmarinHoleEl = null;
  fitSousmarinBoard();

  // Toutes les pièces sont posées dans la pioche UNE SEULE FOIS, dès le départ.
  // Chaque pièce est unique : elle ne disparaît que lorsqu'elle est placée au bon
  // endroit -> plus jamais de doublon, et plus besoin de re-tirer des leurres.
  const piecesRow = document.getElementById('piecesRowSousmarin');
  piecesRow.innerHTML = '';
  const allItems = SOUSMARIN_ROUNDS.map((r,i)=>({ id:'p'+i, img:r.piece }));
  shuffle(allItems).forEach(item=>{
    const piece = buildImgEl(item.img, 'piece');
    piece.dataset.id = item.id;
    attachDrag(piece, item, onSousmarinDrop);
    piecesRow.appendChild(piece);
  });

  setupSousmarinLevel();
}

function setupSousmarinLevel(){
  const round = SOUSMARIN_ROUNDS[sousmarinLevel];
  const board = document.getElementById('sousmarinBoard');

  // Un seul trou, toujours au même endroit : on le crée une fois, puis on
  // change juste la forme affichée dedans à chaque manche.
  if(!sousmarinHoleEl){
    sousmarinHoleEl = document.createElement('div');
    sousmarinHoleEl.className = 'shape-base hole';
    sousmarinHoleEl.style.width = SOUSMARIN_HOLE_SPOT.w+'%';
    sousmarinHoleEl.style.height = SOUSMARIN_HOLE_SPOT.h+'%';
    sousmarinHoleEl.style.top = SOUSMARIN_HOLE_SPOT.top+'%';
    sousmarinHoleEl.style.left = SOUSMARIN_HOLE_SPOT.left+'%';
    sousmarinHoleEl.style.transform = 'translate(-50%,-50%)';
    board.appendChild(sousmarinHoleEl);
  }
  sousmarinHoleEl.classList.remove('filled', 'hover');
  sousmarinHoleEl.dataset.id = 'p'+sousmarinLevel;
  sousmarinHoleEl.innerHTML = '';
  const inner = buildImgEl(round.piece, 'hole-piece');
  sousmarinHoleEl.appendChild(inner);
}

function onSousmarinDrop(hole, pieceEl, item){
  if(hole.dataset.id === item.id){
    hole.classList.add('filled');
    pieceEl.classList.add('placed');
    playSfx('chime');
    toast('🎉 Bien joué !');
    const r = hole.getBoundingClientRect();
    burstConfetti(r.left + r.width/2, r.top + r.height/2);

    if(sousmarinLevel + 1 >= SOUSMARIN_ROUNDS.length){
      setTimeout(()=>{
        playSfx('win');
        stopSousmarinMusic();
        document.getElementById('endBannerSousmarin').classList.add('show');
      }, 500);
    } else {
      sousmarinLevel++;
      toast('✨ Manche ' + (sousmarinLevel+1) + ' / ' + SOUSMARIN_ROUNDS.length + ' !');
      setTimeout(setupSousmarinLevel, 1000);
    }
  } else {
    playSfx('miss');
    toast('Essaie encore ! 🤔');
  }
}

document.getElementById('againBtnSousmarin').addEventListener('click', ()=>{
  document.getElementById('endBannerSousmarin').classList.remove('show');
  startSousmarin();
  startSousmarinMusic();
});
</script>
