<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Les formes - Le Monde de Malo</title>
<style>
  html,body{ margin:0; padding:0; overflow:hidden; touch-action:manipulation; overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;-moz-user-select:none;-ms-user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent;
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
  }
  *{-webkit-tap-highlight-color:transparent; box-sizing:border-box;}
  ::selection{background:transparent;}
  #wrap{
    position:relative; width:100vw; height:100vh; overflow:hidden;
    background:linear-gradient(180deg,#bfe9ff 0%,#eaf6ff 45%,#fff3d6 100%);
    display:flex; flex-direction:column;
  }

  .topbar{position:relative; z-index:40; display:flex; justify-content:space-between; align-items:flex-start; padding:14px;}
  .round-btn{
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.75); border:3px solid rgba(255,255,255,.95);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:900; color:#3a4a5a; text-decoration:none;
    box-shadow:0 4px 10px rgba(0,0,0,.2); cursor:pointer;
  }
  .round-btn:active{ transform:scale(.94); }
  .score-pill{
    background:rgba(255,255,255,.85); border-radius:20px; padding:8px 18px;
    font-size:clamp(14px,3.6vw,18px); font-weight:800; color:#5a3a1c;
    box-shadow:0 4px 10px rgba(0,0,0,.2); white-space:nowrap;
  }

  /* ---- menu des modes ---- */
  #modePicker{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:0 6vw; }
  #modePicker h1{ color:#e0932a; font-size:clamp(22px,7vw,30px); margin:0; text-shadow:0 2px 3px rgba(255,255,255,.7); text-align:center; }
  #modeGrid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; width:100%; max-width:420px; }
  .mode-card{
    background:rgba(255,255,255,.8); border:4px solid #fff; border-radius:22px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    padding:16px 8px; box-shadow:0 6px 14px rgba(0,0,0,.2); cursor:pointer; aspect-ratio:1/0.85;
  }
  .mode-card:active{ transform:scale(.95); }
  .mode-card .mode-emoji{ font-size:44px; }
  .mode-card .mode-label{ font-weight:800; color:#5a3a1c; font-size:15px; }
  .mode-card.soon{ opacity:.55; cursor:default; }
  .mode-card.soon:active{ transform:none; }
  .mode-card .mode-tag{ font-size:10px; font-weight:800; color:#a5672f; background:#fff3d6; padding:2px 8px; border-radius:10px; }

  /* ---- mode pizza : une seule image plein écran ---- */
  #pizzaMode{ display:none; flex:1; flex-direction:column; align-items:center; justify-content:space-between; padding:0; overflow:hidden; }
  .row-label{ font-weight:800; color:#5a3a1c; font-size:clamp(13px,3.8vw,17px); text-align:center; text-shadow:0 1px 2px rgba(255,255,255,.6); }

  #pizzaStage{ position:relative; width:100%; flex:1; overflow:hidden; }
  #pizzaImg{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; }
  #pizzaBoard{ position:absolute; }

  #piecesRow{ display:flex; justify-content:center; gap:2.2vw; width:100%; padding:6px 4vw 10px; flex-wrap:wrap; }

  .shape-base{ width:13vw; height:13vw; max-width:58px; max-height:58px; }

  .piece{
    cursor:grab; touch-action:none;
    transition:opacity .2s;
  }
  .piece.placed{ opacity:0; pointer-events:none; }

  .hole{
    position:absolute;
    display:flex; align-items:center; justify-content:center;
  }
  .hole.hover .hole-piece{ filter:drop-shadow(0 3px 4px rgba(0,0,0,.35)) brightness(1.3); }
  .hole .hole-piece{ width:100%; height:100%; opacity:.5; transform:scale(.92); transition:transform .35s cubic-bezier(.3,1.6,.4,1), opacity .3s, filter .2s; }
  .hole.filled .hole-piece{ opacity:1; transform:scale(1); }

  .ghost-piece{ position:fixed; z-index:200; pointer-events:none; opacity:.92; }

  .toast{
    position:absolute; left:50%; top:64px; transform:translateX(-50%);
    background:#fff; padding:9px 20px; border-radius:20px; font-weight:800; color:#a5672f;
    box-shadow:0 4px 10px rgba(0,0,0,.2); opacity:0; transition:opacity .3s; pointer-events:none;
    z-index:60; font-size:clamp(13px,3.6vw,16px); white-space:nowrap;
  }
  .toast.show{ opacity:1; }

  .confetti-piece{position:fixed; pointer-events:none; border-radius:2px; z-index:70;}

  #endBanner{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(255,255,255,.95); opacity:0; pointer-events:none; transition:opacity .3s; text-align:center; z-index:80;
  }
  #endBanner.show{ opacity:1; pointer-events:auto; }
  #endBanner .big{ font-size:54px; margin-bottom:8px; }
  #endBanner h2{ color:#e0507f; font-size:28px; margin:0 0 8px 0; }
  #endBanner p{ color:#5a7a67; font-weight:600; margin:0 0 22px 0; }
  .again-btn{
    background:linear-gradient(180deg,#ffe08a,#ffd166); border:none; border-bottom:5px solid #d99a1f;
    border-radius:40px; padding:14px 40px; font-family:inherit; font-weight:800; font-size:18px;
    color:#7a4a26; cursor:pointer;
  }
  .again-btn:active{ transform:translateY(3px); border-bottom-width:1px; }
</style>
</head>
<body>
<div id="wrap">
  <div class="topbar">
    <a class="round-btn" id="backBtn" href="index.html">←</a>
    <div class="score-pill" id="scorePill" style="display:none;">🍕 <span id="scoreCount">0</span></div>
    <button class="round-btn" id="soundToggle">🔊</button>
  </div>

  <div class="toast" id="toast"></div>

  <!-- MENU DES MODES -->
  <div id="modePicker">
    <h1>🧩 Choisis un jeu !</h1>
    <div id="modeGrid">
      <div class="mode-card" id="cardPizza">
        <div class="mode-emoji">🍕</div>
        <div class="mode-label">Pizza</div>
      </div>
      <div class="mode-card soon">
        <div class="mode-emoji">🤖</div>
        <div class="mode-label">Robot</div>
        <div class="mode-tag">Bientôt</div>
      </div>
      <div class="mode-card soon">
        <div class="mode-emoji">📝</div>
        <div class="mode-label">Tableau</div>
        <div class="mode-tag">Bientôt</div>
      </div>
      <div class="mode-card soon">
        <div class="mode-emoji">🐠</div>
        <div class="mode-label">Sous-marin</div>
        <div class="mode-tag">Bientôt</div>
      </div>
    </div>
  </div>

  <!-- MODE PIZZA -->
  <div id="pizzaMode">
    <div class="row-label">👇 Trouve la bonne place pour chaque ingrédient !</div>
    <div id="pizzaStage">
      <img id="pizzaImg" src="images/pizza_board.jpeg" alt="pizzeria de Malo">
      <div id="pizzaBoard"></div>
    </div>
    <div id="piecesRow"></div>
  </div>

  <div id="endBanner">
    <div class="big">🎉🍕🎉</div>
    <h2>Bravo Malo !</h2>
    <p>Ta pizza est prête !</p>
    <button class="again-btn" id="againBtn">🔁 Rejouer</button>
  </div>
</div>

<script>
/* ================= Son ================= */
let muted = false;
const SFX = {
  chime: new Audio('sounds/chime.wav'),
  miss:  new Audio('sounds/miss.wav'),
  win:   new Audio('sounds/win.wav'),
};
function playSfx(name){
  if(muted) return;
  const src = SFX[name]; if(!src) return;
  try{ const a = src.cloneNode(); a.volume = 0.65; a.play().catch(()=>{}); }catch(e){}
}
document.getElementById('soundToggle').addEventListener('click', ()=>{
  muted = !muted;
  document.getElementById('soundToggle').textContent = muted ? '🔇' : '🔊';
});

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=> t.classList.remove('show'), 1300);
}

function burstConfetti(x, y){
  const colors = ['#ff6f9c','#ffd166','#8fd694','#6fc3ff','#c98fff'];
  for(let i=0;i<16;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const size = 6 + Math.random()*6;
    p.style.width = size+'px'; p.style.height = size+'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.left = x+'px'; p.style.top = y+'px';
    document.body.appendChild(p);
    const dx = (Math.random()-0.5)*260;
    const dy = -(100+Math.random()*180);
    p.style.transition = 'transform .9s cubic-bezier(.2,.8,.3,1), opacity .9s';
    requestAnimationFrame(()=>{
      p.style.transform = `translate(${dx}px, ${dy}px) rotate(${Math.random()*360}deg)`;
      p.style.opacity = '0';
    });
    setTimeout(()=> p.remove(), 950);
  }
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ================= Positionner le plateau exactement sur l'image affichée (object-fit:contain) ================= */
const pizzaImg = document.getElementById('pizzaImg');
const pizzaStage = document.getElementById('pizzaStage');
const pizzaBoard = document.getElementById('pizzaBoard');
function fitPizzaBoard(){
  const cw = pizzaStage.clientWidth, ch = pizzaStage.clientHeight;
  const iw = pizzaImg.naturalWidth || 854, ih = pizzaImg.naturalHeight || 1842;
  if(!cw || !ch) return;
  const scale = Math.min(cw/iw, ch/ih);
  const dw = iw*scale, dh = ih*scale;
  const dx = (cw-dw)/2, dy = (ch-dh)/2;
  pizzaBoard.style.left = dx+'px';
  pizzaBoard.style.top = dy+'px';
  pizzaBoard.style.width = dw+'px';
  pizzaBoard.style.height = dh+'px';
}
if(pizzaImg.complete) fitPizzaBoard();
pizzaImg.addEventListener('load', fitPizzaBoard);
window.addEventListener('resize', fitPizzaBoard);

/* ================= Menu ================= */
document.getElementById('cardPizza').addEventListener('click', ()=>{
  document.getElementById('modePicker').style.display = 'none';
  document.getElementById('pizzaMode').style.display = 'flex';
  document.getElementById('scorePill').style.display = 'flex';
  document.getElementById('backBtn').onclick = (e)=>{
    e.preventDefault();
    document.getElementById('pizzaMode').style.display = 'none';
    document.getElementById('scorePill').style.display = 'none';
    document.getElementById('modePicker').style.display = 'flex';
  };
  fitPizzaBoard();
  startPizza();
});

/* ================= Mode Pizza ================= */
const TOPPINGS = [
  { id:'tomato',    img:'images/tomato.png',    label:'Tomate',    top:46.5, left:50.4 },
  { id:'cream',     img:'images/cream.png',     label:'Fromage',   top:50.1, left:36.9 },
  { id:'pepperoni', img:'images/pepperoni.png', label:'Pepperoni', top:50.1, left:62.6 },
  { id:'onion',     img:'images/onion.png',     label:'Oignon',    top:55.8, left:34.3 },
  { id:'basil',     img:'images/basil.png',     label:'Basilic',   top:56.1, left:49.1 },
  { id:'cheese',    img:'images/cheese.png',    label:'Fromage',   top:56.4, left:64.6 },
  { id:'mushroom',  img:'images/mushroom.png',  label:'Champignon',top:61.8, left:35.6 },
  { id:'pepper',    img:'images/pepper.png',    label:'Poivron',   top:62.3, left:51.1 },
  { id:'bacon',     img:'images/bacon.png',     label:'Bacon',     top:61.8, left:64.6 },
];

let pizzaPlaced = 0;
let score = 0;
let dragState = null;

function buildImgEl(imgSrc, extraClass){
  const el = document.createElement('img');
  el.src = imgSrc;
  el.draggable = false;
  el.className = 'shape-base' + (extraClass ? ' ' + extraClass : '');
  el.style.objectFit = 'contain';
  el.style.background = 'transparent';
  el.style.filter = 'drop-shadow(0 3px 4px rgba(0,0,0,.35))';
  return el;
}

function startPizza(){
  score = 0; pizzaPlaced = 0;
  document.getElementById('scoreCount').textContent = 0;

  const board = document.getElementById('pizzaBoard');
  board.innerHTML = '';

  TOPPINGS.forEach(t=>{
    const hole = document.createElement('div');
    hole.className = 'shape-base hole';
    hole.style.width = '11%'; hole.style.height = '5.1%';
    hole.style.top = t.top+'%'; hole.style.left = t.left+'%';
    hole.style.transform = 'translate(-50%,-50%)';
    hole.dataset.id = t.id;
    const inner = buildImgEl(t.img, 'hole-piece');
    hole.appendChild(inner);
    board.appendChild(hole);
  });

  const piecesRow = document.getElementById('piecesRow');
  piecesRow.innerHTML = '';
  shuffle(TOPPINGS).forEach(t=>{
    const piece = buildImgEl(t.img, 'piece');
    piece.dataset.id = t.id;
    attachDrag(piece, t);
    piecesRow.appendChild(piece);
  });
}

function attachDrag(el, item){
  el.addEventListener('pointerdown', (ev)=>{
    if(el.classList.contains('placed')) return;
    ev.preventDefault();
    const rect = el.getBoundingClientRect();
    const ghost = buildImgEl(item.img, 'ghost-piece');
    ghost.style.width = rect.width+'px';
    ghost.style.height = rect.height+'px';
    ghost.style.left = (ev.clientX - rect.width/2) + 'px';
    ghost.style.top = (ev.clientY - rect.height/2) + 'px';
    document.body.appendChild(ghost);
    dragState = { el, item, ghost, w:rect.width, h:rect.height, pointerId: ev.pointerId };
  }, {passive:false});
}

window.addEventListener('pointermove', (ev)=>{
  if(!dragState || ev.pointerId !== dragState.pointerId) return;
  dragState.ghost.style.left = (ev.clientX - dragState.w/2) + 'px';
  dragState.ghost.style.top = (ev.clientY - dragState.h/2) + 'px';
  document.querySelectorAll('.hole:not(.filled)').forEach(h=>{
    const r = h.getBoundingClientRect();
    const over = ev.clientX>=r.left && ev.clientX<=r.right && ev.clientY>=r.top && ev.clientY<=r.bottom;
    h.classList.toggle('hover', over);
  });
}, {passive:true});

function endDrag(ev){
  if(!dragState || ev.pointerId !== dragState.pointerId) return;
  let landed = null;
  document.querySelectorAll('.hole:not(.filled)').forEach(h=>{
    h.classList.remove('hover');
    const r = h.getBoundingClientRect();
    const over = ev.clientX>=r.left && ev.clientX<=r.right && ev.clientY>=r.top && ev.clientY<=r.bottom;
    if(over) landed = h;
  });

  if(landed){
    if(landed.dataset.id === dragState.item.id){
      landed.classList.add('filled');
      dragState.el.classList.add('placed');
      score++;
      pizzaPlaced++;
      document.getElementById('scoreCount').textContent = score;
      playSfx('chime');
      toast('🎉 Bien joué !');
      const r = landed.getBoundingClientRect();
      burstConfetti(r.left + r.width/2, r.top + r.height/2);
      if(pizzaPlaced >= TOPPINGS.length){
        setTimeout(()=>{
          playSfx('win');
          document.getElementById('endBanner').classList.add('show');
        }, 500);
      }
    } else {
      playSfx('miss');
      toast('Essaie encore ! 🤔');
    }
  }

  dragState.ghost.remove();
  dragState = null;
}
window.addEventListener('pointerup', endDrag, {passive:true});
window.addEventListener('pointercancel', ()=>{
  if(dragState){ dragState.ghost.remove(); dragState = null; }
}, {passive:true});

document.getElementById('againBtn').addEventListener('click', ()=>{
  document.getElementById('endBanner').classList.remove('show');
  startPizza();
});
</script>
</body>
</html>
